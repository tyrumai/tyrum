appId: net.tyrum.desktop
productName: Tyrum Desktop
directories:
  output: release
files:
  - dist/**/*
  - "!dist/gateway/**"
  - "!node_modules"
extraResources:
  - from: dist/gateway/index.mjs
    to: gateway/index.mjs
mac:
  target: [dmg, zip]
  category: public.app-category.productivity
win:
  target: [nsis, portable]
linux:
  target: [AppImage, deb]
  category: Utility
