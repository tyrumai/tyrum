appId: net.tyrum.desktop
productName: Tyrum
protocols:
  name: Tyrum
  schemes:
    - tyrum
directories:
  output: release
npmRebuild: false
publish:
  - provider: github
    owner: rhernaus
    repo: tyrum
files:
  - dist/**/*
  - "!dist/gateway/**"
  - "!node_modules"
asarUnpack:
  - node_modules/tesseract.js/**
  - node_modules/tesseract.js-core/**
extraResources:
  - from: dist/gateway/index.mjs
    to: gateway/index.mjs
  - from: dist/gateway/migrations
    to: gateway/migrations
  - from: dist/gateway/node_modules
    to: gateway/node_modules
  - from: build/icons/32x32.png
    to: tray/32x32.png
  - from: build/tray-macos-template.svg
    to: tray/macos-template.svg
mac:
  icon: build/icon.icns
  target: [dmg, zip]
  category: public.app-category.productivity
  hardenedRuntime: true
win:
  icon: build/icon.ico
  target: [nsis, portable]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Tyrum
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
linux:
  icon: build/icons
  target: [AppImage, tar.gz]
  category: Utility
  desktop:
    entry:
      Name: Tyrum
      Comment: Tyrum desktop app
      StartupWMClass: Tyrum
