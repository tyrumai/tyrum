appId: net.tyrum.desktop
productName: Tyrum Desktop
directories:
  output: release
publish:
  - provider: github
    owner: rhernaus
    repo: tyrum
files:
  - dist/**/*
  - "!dist/gateway/**"
  - "!node_modules"
extraResources:
  - from: dist/gateway/index.mjs
    to: gateway/index.mjs
mac:
  target: [dmg, zip]
  category: public.app-category.productivity
  hardenedRuntime: true
win:
  target: [nsis, portable]
linux:
  target: [AppImage, tar.gz]
  category: Utility
