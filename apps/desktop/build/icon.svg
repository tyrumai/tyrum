<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  role="img"
  aria-label="Tyrum icon"
>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)" />

  <!-- Minimal, fontless “T” mark so icon generation stays deterministic. -->
  <rect x="256" y="280" width="512" height="140" rx="70" fill="#ffffff" />
  <rect x="442" y="320" width="140" height="480" rx="70" fill="#ffffff" />
</svg>

