services:
  # ---------------------------------------------------------------------------
  # Default: single container (all roles) + SQLite
  # ---------------------------------------------------------------------------

  tyrum:
    build: .
    command:
      [
        "all",
        "--home",
        "/var/lib/tyrum",
        "--db",
        "/var/lib/tyrum/gateway.db",
        "--host",
        "0.0.0.0",
        "--port",
        "8788",
        "--allow-insecure-http",
        "--enable-engine-api",
      ]
    environment:
      GATEWAY_DB_PATH: /var/lib/tyrum/gateway.db
      # Snapshot import is disabled by default. Enable explicitly for restore workflows.
      TYRUM_SNAPSHOT_IMPORT_ENABLED: ${TYRUM_SNAPSHOT_IMPORT_ENABLED:-0}
    ports:
      - "8788:8788"
    volumes:
      - tyrum-data:/var/lib/tyrum
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: Linux desktop sandbox (Xfce + noVNC) + paired desktop node
  # Enable with: docker compose --profile desktop-sandbox up --build
  # ---------------------------------------------------------------------------

  desktop-sandbox:
    profiles: ["desktop-sandbox"]
    build:
      context: .
      dockerfile: docker/desktop-sandbox/Dockerfile
    environment:
      TYRUM_HOME: /var/lib/tyrum-node
      TYRUM_GATEWAY_WS_URL: ws://tyrum:8788/ws
      TYRUM_GATEWAY_TOKEN_PATH: /gateway/.admin-token
      TYRUM_NODE_LABEL: tyrum-desktop-sandbox
      TYRUM_NODE_MODE: desktop-sandbox
      # Surface a stable URL for operator takeover (shown in the pairing UI label).
      TYRUM_DESKTOP_SANDBOX_TAKEOVER_URL: ${TYRUM_DESKTOP_SANDBOX_TAKEOVER_URL:-http://localhost:6080/vnc.html?autoconnect=true}
    ports:
      - "127.0.0.1:5900:5900"
      - "127.0.0.1:6080:6080"
    volumes:
      - tyrum-data:/gateway:ro
      - tyrum-desktop-node:/var/lib/tyrum-node
    depends_on:
      - tyrum
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: split services + Postgres (safe; no split-on-SQLite)
  # Enable with: docker compose --profile split up
  # ---------------------------------------------------------------------------

  tyrum-edge:
    profiles: ["split"]
    build: .
    command:
      [
        "edge",
        "--home",
        "/var/lib/tyrum",
        "--db",
        "${GATEWAY_DB_PATH:-postgres://${POSTGRES_USER:-tyrum}:${POSTGRES_PASSWORD:-tyrum}@postgres:5432/${POSTGRES_DB:-tyrum}}",
        "--host",
        "0.0.0.0",
        "--port",
        "8788",
        "--allow-insecure-http",
        "--enable-engine-api",
      ]
    environment:
      GATEWAY_DB_PATH: ${GATEWAY_DB_PATH:-postgres://${POSTGRES_USER:-tyrum}:${POSTGRES_PASSWORD:-tyrum}@postgres:5432/${POSTGRES_DB:-tyrum}}
      # Snapshot import is disabled by default. Enable explicitly for restore workflows.
      TYRUM_SNAPSHOT_IMPORT_ENABLED: ${TYRUM_SNAPSHOT_IMPORT_ENABLED:-0}
    depends_on:
      - postgres
    ports:
      - "8788:8788"
    restart: unless-stopped

  tyrum-worker:
    profiles: ["split"]
    build: .
    command:
      [
        "worker",
        "--home",
        "/var/lib/tyrum",
        "--db",
        "${GATEWAY_DB_PATH:-postgres://${POSTGRES_USER:-tyrum}:${POSTGRES_PASSWORD:-tyrum}@postgres:5432/${POSTGRES_DB:-tyrum}}",
      ]
    environment:
      GATEWAY_DB_PATH: ${GATEWAY_DB_PATH:-postgres://${POSTGRES_USER:-tyrum}:${POSTGRES_PASSWORD:-tyrum}@postgres:5432/${POSTGRES_DB:-tyrum}}
      # Keep bootstrap snapshot-import seeding consistent across split-role startup races.
      TYRUM_SNAPSHOT_IMPORT_ENABLED: ${TYRUM_SNAPSHOT_IMPORT_ENABLED:-0}
    depends_on:
      - postgres
    volumes:
      - tyrum-data:/var/lib/tyrum
    restart: unless-stopped

  tyrum-scheduler:
    profiles: ["split"]
    build: .
    command:
      [
        "scheduler",
        "--home",
        "/var/lib/tyrum",
        "--db",
        "${GATEWAY_DB_PATH:-postgres://${POSTGRES_USER:-tyrum}:${POSTGRES_PASSWORD:-tyrum}@postgres:5432/${POSTGRES_DB:-tyrum}}",
      ]
    environment:
      GATEWAY_DB_PATH: ${GATEWAY_DB_PATH:-postgres://${POSTGRES_USER:-tyrum}:${POSTGRES_PASSWORD:-tyrum}@postgres:5432/${POSTGRES_DB:-tyrum}}
      # Keep bootstrap snapshot-import seeding consistent across split-role startup races.
      TYRUM_SNAPSHOT_IMPORT_ENABLED: ${TYRUM_SNAPSHOT_IMPORT_ENABLED:-0}
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    profiles: ["split"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tyrum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tyrum}
      POSTGRES_DB: ${POSTGRES_DB:-tyrum}
    ports:
      - "5432:5432"
    volumes:
      - tyrum-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  # Optional S3-compatible object store for artifacts (wired in `secrets_artifacts_redaction`).
  minio:
    image: minio/minio:latest
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tyrum-minio:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    profiles: ["minio"]
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        set -eu;
        : "$${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}";
        : "$${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}";
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done;
        mc mb -p local/tyrum-artifacts || true;
        exit 0;
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}

volumes:
  tyrum-data:
  tyrum-postgres:
  tyrum-minio:
  tyrum-desktop-node:
