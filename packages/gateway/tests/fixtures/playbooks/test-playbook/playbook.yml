id: test-playbook
name: Test Playbook
description: A playbook used in automated tests
version: "1.0.0"
steps:
  - id: cli
    name: Echo something
    command: cli echo "hello world"
    output: text
  - id: http
    name: Make HTTP request
    command: http GET https://example.com/data
    output: json
  - id: web
    name: Navigate
    command: web navigate https://example.com
allowed_domains:
  - example.com
consent_boundary: "requires_approval"
