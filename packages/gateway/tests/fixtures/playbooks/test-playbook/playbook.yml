id: test-playbook
name: Test Playbook
description: A playbook used in automated tests
version: "1.0.0"
steps:
  - id: research
    name: Research the topic
    command: research test query
    output: text
  - id: notify
    name: Send a message
    command: message to=user@example.com body="Hello from playbook"
    rollback_hint: Retry the message
  - id: store
    name: Store the result
    command: store key=result value=done
allowed_domains:
  - example.com
consent_boundary: "requires_approval"
