id: test-playbook
name: Test Playbook
description: A playbook used in automated tests
version: "1.0.0"
steps:
  - id: web-nav
    name: Navigate to page
    command: web navigate https://example.com
  - id: web-click
    name: Click element
    command: web click "#submit"
  - id: web-snap
    name: Capture snapshot
    command: web snapshot
allowed_domains:
  - example.com
consent_boundary: "requires_approval"
