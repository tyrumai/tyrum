name: "Feature request"
description: "Describe a new capability or behaviour change."
title: "[Feature] "
labels:
  - "type: feature"
body:
  - type: markdown
    attributes:
      value: |
        Align the request with docs/product_concept_v1.md and note guardrails.
  - type: input
    id: summary
    attributes:
      label: "Summary"
      placeholder: "One line describing the desired outcome"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: "Problem statement"
      description: "What user or system problem are we solving?"
      placeholder: "Describe the current limitation or opportunity."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: "Proposed solution"
      description: "Outline the expected behaviour, API changes, or UX flow."
      placeholder: "Include guardrails, policy implications, and telemetry updates."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance criteria"
      description: "List testable bullets (Given/When/Then or outcome focused)."
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies"
      description: "Note upstream issues, feature flags, secrets, or external teams."
  - type: textarea
    id: validation
    attributes:
      label: "Validation plan"
      description: "Commands, tests, or dashboards to confirm success."
  - type: textarea
    id: references
    attributes:
      label: "References"
      description: "Link docs, designs, API specs, or related issues/PRs."
