name: "Bug report"
description: "Report a regression or defect impacting expected behaviour."
title: "[Bug] "
labels:
  - "type: bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us harden Tyrum.
  - type: input
    id: summary
    attributes:
      label: "Summary"
      placeholder: "One line describing the observed bug"
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: "Impact"
      description: "How severe is the bug for customers or the team?"
      options:
        - "P0 – Production outage or data loss"
        - "P1 – Critical workflow blocked"
        - "P2 – Workaround available"
        - "P3 – Cosmetic or low risk"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Include stack (local, staging, prod), feature flags, browser, OS, and commit SHA."
      placeholder: "e.g., staging, compose up, macOS 15.0, commit abc1234"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to reproduce"
      description: "Enumerate exact steps to trigger the bug."
      placeholder: "1. ...\n2. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected behaviour"
      placeholder: "Describe what should happen."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual behaviour"
      placeholder: "Describe what actually happens, including errors or screenshots."
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: "Logs, traces, or screenshots"
      description: "Attach relevant artifacts, trace IDs, or log snippets."
  - type: textarea
    id: references
    attributes:
      label: "Related issues, docs, or PRs"
      description: "Link to supporting material so others can triage quickly."
