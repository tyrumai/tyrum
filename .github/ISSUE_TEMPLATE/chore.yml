name: "Chore"
description: "Track maintenance, refactors, or enabling work."
title: "[Chore] "
labels:
  - "type: chore"
body:
  - type: markdown
    attributes:
      value: |
        Use chores to keep the foundation healthy without shipping new features.
  - type: input
    id: summary
    attributes:
      label: "Summary"
      placeholder: "One line describing the task"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Context"
      description: "Why now? Include related outages, tech debt, or compliance notes."
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: "Deliverables"
      description: "List concrete checkpoints or artifacts to produce."
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance criteria"
      description: "How will we know this chore is complete?"
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: "Risks & mitigation"
      description: "Note potential failure modes and how to handle them."
  - type: textarea
    id: references
    attributes:
      label: "References"
      description: "Link docs, dashboards, or prior issues/PRs."
