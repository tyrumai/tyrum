version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    directory: "/apps/console"
    schedule:
      interval: "daily"
  - package-ecosystem: "docker"
    directory: "/infra/docker"
    schedule:
      interval: "daily"
  - package-ecosystem: "helm"
    directory: "/infra/helm/preview-stack"
    schedule:
      interval: "daily"
