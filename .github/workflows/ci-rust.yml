name: ci-rust

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  rust:
    name: Rust checks
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install system dependencies
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install --yes pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Detect Rust workspace
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f Cargo.toml ]; then
            echo "has-workspace=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          metadata="$(mktemp)"
          trap 'rm -f "$metadata"' EXIT

          if cargo metadata --format-version 1 --no-deps >"$metadata" 2>/dev/null; then
            if grep -Eq '"packages"[[:space:]]*:[[:space:]]*\[[[:space:]]*\]' "$metadata"; then
              echo "has-workspace=false" >>"$GITHUB_OUTPUT"
            else
              echo "has-workspace=true" >>"$GITHUB_OUTPUT"
            fi
          else
            echo "has-workspace=false" >>"$GITHUB_OUTPUT"
            echo "Cargo metadata unavailable; skipping Rust checks." >>"$GITHUB_STEP_SUMMARY"
          fi

      - name: No Rust packages detected
        if: steps.detect.outputs.has-workspace != 'true'
        run: echo "No Rust workspace detected; skipping Rust CI." >>"$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js for Playwright
        if: steps.detect.outputs.has-workspace == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Playwright browsers
        if: steps.detect.outputs.has-workspace == 'true'
        run: |
          npx --yes playwright@1.46.1 install --with-deps
          echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/.cache/ms-playwright" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1" >> "$GITHUB_ENV"

      - name: cargo fmt
        if: steps.detect.outputs.has-workspace == 'true'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: steps.detect.outputs.has-workspace == 'true'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -D clippy::cognitive_complexity -D clippy::unwrap_used -D clippy::expect_used

      - name: cargo test
        if: steps.detect.outputs.has-workspace == 'true'
        run: cargo test --workspace --all-targets

      - name: cargo test (telegram webhook e2e)
        if: steps.detect.outputs.has-workspace == 'true'
        run: cargo test -p tyrum-api -- --ignored telegram_webhook_e2e
