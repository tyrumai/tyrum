name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packages:
    name: Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install

      - name: Install Playwright (Chromium + system deps)
        run: pnpm --filter tyrum-desktop exec playwright install --with-deps chromium

      - run: pnpm typecheck

      - name: Test (virtual display)
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" pnpm test -- --coverage

      - run: pnpm lint

      - run: pnpm build

  web:
    name: Web
    runs-on: ubuntu-latest
    env:
      PORTAL_SESSION_SECRET: ci-portal-session-secret
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter tyrum-portal lint

      - name: Test
        run: pnpm --filter tyrum-portal test

      - name: Build
        run: pnpm --filter tyrum-portal build
