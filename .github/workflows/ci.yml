name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
      scripts: ${{ steps.filter.outputs.scripts }}
      docs_gate: ${{ steps.filter.outputs.docs_gate }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflows:
              - ".github/workflows/**"
              - ".github/actions/**"
            scripts:
              - "scripts/**"
              - ".github/scripts/**"
            docs_gate:
              - "docs/**"
              - "apps/docs/**"
              - "README.md"
              - "scripts/check-public-docs.sh"
            deps:
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "patches/**"
              - "packages/**/package.json"
              - "apps/**/package.json"
            ci:
              - "packages/**"
              - "apps/desktop/**"
              - "config/**"
              - "web/**"
              - "patches/**"
              - "Dockerfile"
              - "docker-compose.yml"
              - "oxlint.json"
              - "tsconfig.json"
              - "tsconfig.base.json"
              - "vitest.config.ts"
              - ".node-version"
              - ".nvmrc"

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:1.7.11

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Ensure shellcheck is available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi
      - name: Lint shell scripts
        run: shellcheck scripts/install.sh scripts/check-public-docs.sh scripts/smoke-postgres-split.sh scripts/smoke-sqlite-single-host.sh

  docs-public-content:
    name: Docs Public Content Gate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_gate == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Check docs for internal-only content
        run: bash scripts/check-public-docs.sh

  dependency-review:
    name: Dependency Review
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4

  desktop-cross-os:
    name: Validation (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - name: Build desktop type dependencies
        run: pnpm --filter @tyrum/schemas build && pnpm --filter @tyrum/client build

      - name: Typecheck desktop app
        run: pnpm exec tsc --noEmit --project apps/desktop/tsconfig.json

      - run: pnpm lint

      - name: Prettier format check
        shell: bash
        run: |
          git ls-files -z -- '*.ts' '*.tsx' '*.js' '*.mjs' '*.cjs' '*.json' '*.md' '*.mdx' '*.yml' '*.yaml' \
            ':!charts/tyrum/templates/**' \
            ':!charts/tyrum/Chart.yaml' \
            ':!.worktrees/**' \
            ':!web/**' \
          | xargs -0 -n 200 pnpm exec prettier --check

      - run: pnpm build

      - name: Install Playwright (Chromium)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            pnpm --filter tyrum-desktop exec playwright install --with-deps chromium
          else
            pnpm --filter tyrum-desktop exec playwright install chromium
          fi

      - name: Test + coverage (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" pnpm test -- --coverage

      - name: Test packages suite
        if: runner.os != 'Linux'
        run: pnpm exec vitest run packages --passWithNoTests

      - name: Test desktop suite
        if: runner.os != 'Linux'
        shell: bash
        run: pnpm exec vitest run apps/desktop/tests --passWithNoTests

  reference-deployment-smoke:
    name: Reference Deployment Smoke (Docker)
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.scripts == 'true' || needs.changes.outputs.workflows == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Smoke (single-host, SQLite)
        shell: bash
        run: bash scripts/smoke-sqlite-single-host.sh

      - name: Smoke (split-role, Postgres)
        shell: bash
        run: bash scripts/smoke-postgres-split.sh
