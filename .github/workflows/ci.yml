name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
      scripts: ${{ steps.filter.outputs.scripts }}
      docs_gate: ${{ steps.filter.outputs.docs_gate }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflows:
              - ".github/workflows/**"
              - ".github/actions/**"
            scripts:
              - "scripts/**"
              - ".github/scripts/**"
            docs_gate:
              - "docs/**"
              - "apps/docs/**"
              - "README.md"
              - "scripts/check-public-docs.sh"
            deps:
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "patches/**"
              - "packages/**/package.json"
              - "apps/**/package.json"
            ci:
              - "packages/**"
              - "apps/desktop/**"
              - "apps/web/**"
              - "apps/docs/**"
              - "config/**"
              - "web/**"
              - "patches/**"
              - "Dockerfile"
              - "docker-compose.yml"
              - ".oxlintrc.json"
              - ".oxlintrc.new-files.json"
              - "tsconfig.json"
              - "tsconfig.base.json"
              - "vitest.config.ts"
              - ".node-version"
              - ".nvmrc"

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:1.7.11

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Ensure shellcheck is available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi
      - name: Lint shell scripts
        run: shellcheck scripts/install.sh scripts/check-public-docs.sh scripts/smoke-postgres-split.sh scripts/smoke-sqlite-single-host.sh

  docs-public-content:
    name: Docs Public Content Gate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_gate == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Check docs for internal-only content
        run: bash scripts/check-public-docs.sh

  dependency-review:
    name: Dependency Review
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4

  validation:
    name: Validation (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure node-gyp to use local headers (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          node_prefix="$(dirname "$(dirname "$(command -v node)")")"
          echo "npm_config_nodedir=$node_prefix" >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile

      - name: New-file lint gates (PR)
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --no-tags --prune --unshallow
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            base="$(git rev-parse HEAD^1)"
          fi
          node scripts/lint/oxlint-new-files.mjs --base "$base"

      - name: Oxlint report (warn)
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
        run: pnpm lint:oxlint:report

      - name: Typecheck (packages)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm typecheck

      - name: Typecheck (desktop app)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm exec tsc --noEmit --project apps/desktop/tsconfig.json

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: pnpm lint

      - name: Prettier format check
        if: matrix.os == 'ubuntu-latest'
        run: pnpm format:check

      - name: Build
        if: matrix.os == 'ubuntu-latest'
        run: pnpm build

      - name: Build desktop type dependencies
        if: matrix.os != 'ubuntu-latest'
        run: pnpm --filter @tyrum/schemas build && pnpm --filter @tyrum/client build && pnpm --filter @tyrum/operator-core build && pnpm --filter @tyrum/operator-ui build

      - name: Build desktop app
        if: matrix.os != 'ubuntu-latest'
        run: pnpm --filter tyrum-desktop build

      - name: Install Playwright (Chromium)
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            pnpm --filter tyrum-desktop exec playwright install --with-deps chromium
          else
            pnpm --filter tyrum-desktop exec playwright install chromium
          fi

      - name: Test + coverage
        if: matrix.os == 'ubuntu-latest'
        run: >
          xvfb-run -a --server-args="-screen 0 1920x1080x24"
          pnpm test
          --coverage.enabled
          --coverage.reporter=text-summary
          --coverage.reporter=html
          --coverage.reporter=clover
          --coverage.reporter=json

      - name: Test desktop suite
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        run: pnpm exec vitest run apps/desktop/tests --passWithNoTests

      - name: Coverage summary
        if: always() && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Coverage (ubuntu-latest)"
            echo ""
            echo "Download the full HTML report from the \`coverage-report-ubuntu\` artifact."
            echo ""

            if [ ! -f coverage/index.html ]; then
              echo "No coverage report found at \`coverage/index.html\`."
              exit 0
            fi

            python3 - <<'PY'
          import re
          from pathlib import Path

          html = Path("coverage/index.html").read_text("utf-8", errors="ignore")

          def grab(label: str):
              pat = (
                  rf'<span class="strong">\s*([0-9.]+)%\s*</span>'
                  rf'\s*<span class="quiet">{re.escape(label)}</span>'
                  r"\s*<span class='fraction'>(\d+)/(\d+)</span>"
              )
              match = re.search(pat, html, re.S)
              if not match:
                  return None
              pct, covered, total = match.groups()
              return float(pct), int(covered), int(total)

          labels = ["Statements", "Branches", "Functions", "Lines"]
          rows = {label: grab(label) for label in labels}

          print("| Metric | % | Covered / Total |")
          print("|---|---:|---:|")
          for label in labels:
              row = rows[label]
              if row is None:
                  print(f"| {label} | n/a | n/a |")
                  continue
              pct, covered, total = row
              print(f"| {label} | {pct:.2f}% | {covered}/{total} |")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-ubuntu
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Coverage by component
        if: always() && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo ""
            node scripts/coverage/components.mjs
          } >> "$GITHUB_STEP_SUMMARY"

  reference-deployment-smoke:
    name: Reference Deployment Smoke (Docker)
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.scripts == 'true' || needs.changes.outputs.workflows == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Smoke (single-host, SQLite)
        shell: bash
        run: bash scripts/smoke-sqlite-single-host.sh

      - name: Smoke (split-role, Postgres)
        shell: bash
        run: bash scripts/smoke-postgres-split.sh
