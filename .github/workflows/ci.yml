name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:1.7.11

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure shellcheck is available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi
      - name: Lint installer script
        run: shellcheck scripts/install.sh

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4

  desktop-cross-os:
    name: Validation (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - name: Build desktop type dependencies
        run: pnpm --filter @tyrum/schemas build && pnpm --filter @tyrum/client build

      - name: Typecheck desktop app
        run: pnpm exec tsc --noEmit --project apps/desktop/tsconfig.json

      - run: pnpm lint

      - run: pnpm build

      - name: Install Playwright (Chromium)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            pnpm --filter tyrum-desktop exec playwright install --with-deps chromium
          else
            pnpm --filter tyrum-desktop exec playwright install chromium
          fi

      - name: Test + coverage (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" pnpm test -- --coverage

      - name: Test packages suite
        if: runner.os != 'Linux'
        run: pnpm exec vitest run packages --passWithNoTests

      - name: Test desktop suite
        if: runner.os != 'Linux'
        shell: bash
        run: pnpm exec vitest run apps/desktop/tests --passWithNoTests
