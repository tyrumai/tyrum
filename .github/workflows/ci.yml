name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
      scripts: ${{ steps.filter.outputs.scripts }}
      docs_gate: ${{ steps.filter.outputs.docs_gate }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
      desktop_ci: ${{ steps.filter.outputs.desktop_ci }}
      deployment_smoke: ${{ steps.filter.outputs.deployment_smoke }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            workflows:
              - ".github/workflows/**"
              - ".github/actions/**"
            scripts:
              - "scripts/**"
              - ".github/scripts/**"
            docs_gate:
              - "docs/**"
              - "apps/docs/**"
              - "README.md"
              - "scripts/check-public-docs.sh"
            deps:
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "patches/**"
              - "packages/**/package.json"
              - "apps/**/package.json"
            ci:
              - "packages/**"
              - "apps/desktop/**"
              - "apps/mobile/**"
              - "apps/web/**"
              - "scripts/lint/**"
              - "scripts/vite/**"
              - "config/**"
              - "docker/**"
              - "web/**"
              - "patches/**"
              - "Dockerfile"
              - "docker-compose.yml"
              - ".oxlintrc.json"
              - ".oxlintrc.new-files.json"
              - "tsconfig.json"
              - "tsconfig.base.json"
              - "vitest.config.ts"
              - ".node-version"
              - ".nvmrc"
            desktop_ci:
              - "apps/desktop/**"
              - "apps/web/**"
              - "packages/cli-utils/**"
              - "packages/contracts/**"
              - "packages/desktop-node/**"
              - "packages/gateway/**"
              - "packages/node-sdk/**"
              - "packages/operator-app/**"
              - "packages/operator-ui/**"
              - "packages/runtime-agent/**"
              - "packages/runtime-execution/**"
              - "packages/runtime-node-control/**"
              - "packages/runtime-policy/**"
              - "packages/runtime-workboard/**"
              - "packages/transport-sdk/**"
              - "scripts/vite/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "patches/**"
              - "tsconfig.json"
              - "tsconfig.base.json"
              - ".node-version"
              - ".nvmrc"
            deployment_smoke:
              - "Dockerfile"
              - "docker-compose.yml"
              - "config/**"
              - "docker/**"
              - "apps/web/**"
              - "packages/cli-utils/**"
              - "packages/contracts/**"
              - "packages/gateway/**"
              - "packages/operator-app/**"
              - "packages/operator-ui/**"
              - "packages/runtime-agent/**"
              - "packages/runtime-execution/**"
              - "packages/runtime-node-control/**"
              - "packages/runtime-policy/**"
              - "packages/runtime-workboard/**"
              - "packages/transport-sdk/**"
              - "scripts/smoke-postgres-split.sh"
              - "scripts/smoke-sqlite-single-host.sh"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "patches/**"
              - "tsconfig.json"
              - "tsconfig.base.json"
              - ".node-version"
              - ".nvmrc"

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker://rhysd/actionlint:1.7.11@sha256:6f03470d0152251d7f07f7c4dc019dbe7024c72cd952f839544c7798843efa8f

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Ensure shellcheck is available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi
      - name: Lint shell scripts
        run: shellcheck scripts/install.sh scripts/check-public-docs.sh scripts/smoke-postgres-split.sh scripts/smoke-sqlite-single-host.sh

  docs-public-content:
    name: Docs Public Content Gate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_gate == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check docs for internal-only content
        run: bash scripts/check-public-docs.sh
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build docs site
        run: pnpm --filter @tyrum/docs build

  dependency-review:
    name: Dependency Review
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          fail-on-scopes: runtime,unknown

  pr-overwrite-analyzer:
    name: PR Overwrite Analyzer
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Analyze current PR for overwritten merged changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          node scripts/report-rebased-pr-overwrites.mjs
          --pr "${{ github.event.pull_request.number }}"
          --json
          > pr-overwrite-analysis.json

      - name: Append analyzer summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f pr-overwrite-analysis.json ]; then
            {
              echo "## PR Overwrite Analyzer"
              echo ""
              echo "Analyzer output was not produced. Check the job logs."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node --input-type=module <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import { readFileSync } from "node:fs";
          import { toMarkdownReport } from "./scripts/report-rebased-pr-overwrites.mjs";

          const report = JSON.parse(readFileSync("pr-overwrite-analysis.json", "utf8"));
          process.stdout.write(toMarkdownReport(report));
          EOF

      - name: Sync PR analyzer comment
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ github.token }}
          script: |
            const { readFileSync, existsSync } = require('node:fs');
            const { pathToFileURL } = require('node:url');
            const isPermissionError = (error) =>
              error?.status === 403 &&
              /Resource not accessible by integration/i.test(String(error.message ?? ''));

            try {
              if (!existsSync('pr-overwrite-analysis.json')) {
                core.info('Analyzer output was not produced; leaving existing PR comment unchanged.');
                return;
              }

              const marker = '<!-- pr-overwrite-analyzer -->';
              const reportModule = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/report-rebased-pr-overwrites.mjs`).href);
              const report = JSON.parse(readFileSync('pr-overwrite-analysis.json', 'utf8'));
              const { owner, repo } = context.repo;
              const issue_number = context.payload.pull_request.number;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));

              if (report.pairCount === 0) {
                if (existing) {
                  await github.rest.issues.deleteComment({
                    owner,
                    repo,
                    comment_id: existing.id,
                  });
                  core.info(`Deleted stale PR overwrite analyzer comment ${existing.id}.`);
                } else {
                  core.info('No analyzer findings and no existing sticky comment to delete.');
                }
                return;
              }

              const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
              const body = [
                marker,
                reportModule.toMarkdownReport(report).trimEnd(),
                '',
                `Run: ${runUrl}`,
              ].join('\n');

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
                core.info(`Updated PR overwrite analyzer comment ${existing.id}.`);
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info('Created PR overwrite analyzer comment.');
            } catch (error) {
              if (isPermissionError(error)) {
                core.warning(`Skipping PR analyzer comment sync: ${error.message}`);
                return;
              }
              throw error;
            }

      - name: Upload analyzer artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: pr-overwrite-analysis
          path: pr-overwrite-analysis.json
          if-no-files-found: ignore
          retention-days: 7

  linux-foundation:
    name: Linux Foundation (ubuntu-latest)
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: New-file lint gates (PR)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --no-tags --prune --unshallow
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            base="$(git rev-parse HEAD^1)"
          fi
          node scripts/lint/oxlint-new-files.mjs --base "$base"

      - name: Typecheck (packages)
        run: pnpm typecheck

      - name: Typecheck (desktop app)
        run: pnpm exec tsc --noEmit --project apps/desktop/tsconfig.json

      - name: Lint
        run: pnpm lint

      - name: i18n check
        run: pnpm i18n:check

      - name: Prettier format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Stage Linux workspace build artifact
        run: node scripts/ci/stage-build-artifact.mjs --group linux-workspace-builds --artifact-dir .ci-artifacts/linux-workspace-builds

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: linux-workspace-builds
          path: .ci-artifacts/linux-workspace-builds
          if-no-files-found: error
          retention-days: 7

  test-shards:
    name: Test shards (ubuntu-latest) (${{ matrix.shard }}/4)
    needs: [changes, linux-foundation]
    if: needs.linux-foundation.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: linux-workspace-builds
          path: .ci-artifacts/linux-workspace-builds

      - name: Restore Linux workspace build artifact
        run: node scripts/ci/restore-build-artifact.mjs --group linux-workspace-builds --artifact-dir .ci-artifacts/linux-workspace-builds

      - name: Install workspace dependencies
        # Restore workspace build outputs before pnpm links workspace packages so
        # package-local runtime imports can see the restored dist trees too.
        run: pnpm install --frozen-lockfile

      - name: Test (shard) + blob report
        env:
          VITEST_SHARD_RUN: "1"
        run: >
          pnpm exec vitest run
          --passWithNoTests
          --exclude=apps/desktop/tests/**
          --exclude=apps/web/tests/layout-regression.test.ts
          --exclude=apps/web/tests/sidebar-layout-regression.test.ts
          --exclude=packages/gateway/tests/integration/operator-ui-browser-smoke.test.ts
          --exclude=packages/desktop-node/tests/real-playwright-backend.test.ts
          --shard=${{ matrix.shard }}/4
          --reporter=blob
          --outputFile=vitest-reports/blob-${{ matrix.shard }}.json
          --coverage.enabled
          --coverage.reporter=json

      - name: Upload vitest blob report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: vitest-reports/blob-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 7

  linux-browser-suite:
    name: Linux Browser Suite (ubuntu-latest)
    needs: [changes, linux-foundation]
    if: needs.linux-foundation.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Playwright browsers (Chromium)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: linux-workspace-builds
          path: .ci-artifacts/linux-workspace-builds

      - name: Restore Linux workspace build artifact
        run: node scripts/ci/restore-build-artifact.mjs --group linux-workspace-builds --artifact-dir .ci-artifacts/linux-workspace-builds

      - name: Install workspace dependencies
        # Restore workspace build outputs before pnpm links workspace packages so
        # package-local runtime imports can see the restored dist trees too.
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        shell: bash
        run: pnpm --filter tyrum-desktop exec playwright install --with-deps chromium

      - name: Run browser-backed Linux suite
        env:
          VITEST_SHARD_RUN: "1"
        shell: bash
        run: >
          bash scripts/xvfb-run-safe.sh -a --server-args="-screen 0 1920x1080x24" --
          pnpm exec vitest run
          apps/web/tests/layout-regression.test.ts
          apps/web/tests/sidebar-layout-regression.test.ts
          packages/gateway/tests/integration/operator-ui-browser-smoke.test.ts
          packages/desktop-node/tests/real-playwright-backend.test.ts
          --passWithNoTests
          --reporter=blob
          --outputFile=vitest-reports/blob-linux-browser.json
          --coverage.enabled
          --coverage.reporter=json

      - name: Upload vitest blob report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vitest-blob-linux-browser
          path: vitest-reports/blob-linux-browser.json
          if-no-files-found: error
          retention-days: 7

  desktop-linux-build:
    name: Desktop Linux Build (ubuntu-latest)
    needs: [changes, linux-foundation]
    if: needs.linux-foundation.result == 'success' && needs.changes.outputs.desktop_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: linux-workspace-builds
          path: .ci-artifacts/linux-workspace-builds

      - name: Restore Linux workspace build artifact
        run: node scripts/ci/restore-build-artifact.mjs --group linux-workspace-builds --artifact-dir .ci-artifacts/linux-workspace-builds

      - name: Install workspace dependencies
        # Restore workspace build outputs before pnpm links workspace packages so
        # package-local runtime imports can see the restored dist trees too.
        run: pnpm install --frozen-lockfile

      - name: Build desktop release files
        run: pnpm --filter tyrum-desktop dist

      - name: Mark packaged desktop bundle ready for smoke reuse
        run: node apps/desktop/scripts/write-packaged-smoke-stamp.mjs

      - name: Stage desktop Linux build artifact
        run: node scripts/ci/stage-build-artifact.mjs --group desktop-suite-builds --artifact-dir .ci-artifacts/desktop-suite-builds

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: desktop-suite-build-linux
          path: .ci-artifacts/desktop-suite-builds
          if-no-files-found: error
          retention-days: 7

  desktop-linux-test:
    name: Desktop Linux Test (ubuntu-latest)
    needs: [changes, linux-foundation, desktop-linux-build]
    if: needs.linux-foundation.result == 'success' && needs.desktop-linux-build.result == 'success' && needs.changes.outputs.desktop_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Playwright browsers (Chromium)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: desktop-suite-build-linux
          path: .ci-artifacts/desktop-suite-builds

      - name: Restore desktop Linux build artifact
        run: node scripts/ci/restore-build-artifact.mjs --group desktop-suite-builds --artifact-dir .ci-artifacts/desktop-suite-builds

      - name: Install workspace dependencies
        # Restore workspace build outputs before pnpm links workspace packages so
        # package-local runtime imports can see the restored dist trees too.
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        shell: bash
        run: pnpm --filter tyrum-desktop exec playwright install --with-deps chromium

      - name: Test desktop suite
        env:
          VITEST_SHARD_RUN: "1"
          TYRUM_RUN_PACKAGED_SMOKE: "1"
        shell: bash
        run: >
          bash scripts/xvfb-run-safe.sh -a --server-args="-screen 0 1920x1080x24" --
          pnpm exec vitest run
          apps/desktop/tests
          --passWithNoTests
          --reporter=blob
          --outputFile=vitest-reports/blob-desktop-linux.json
          --coverage.enabled
          --coverage.reporter=json

      - name: Upload vitest blob report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vitest-blob-desktop-linux
          path: vitest-reports/blob-desktop-linux.json
          if-no-files-found: error
          retention-days: 7

  test-merge:
    name: Test + coverage (merge) (ubuntu-latest)
    needs: [changes, linux-foundation, test-shards, linux-browser-suite, desktop-linux-test]
    if: needs.linux-foundation.result == 'success' && needs.test-shards.result == 'success' && needs.linux-browser-suite.result == 'success' && (needs.changes.outputs.desktop_ci != 'true' || needs.desktop-linux-test.result == 'success') && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Download shard reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: vitest-blob-*
          path: artifacts
          merge-multiple: true

      - name: Collect blob reports
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vitest-reports
          find artifacts -type f -name 'blob-*.json' -print -exec cp {} vitest-reports/ \;
          count="$(find vitest-reports -maxdepth 1 -type f -name 'blob-*.json' | wc -l | tr -d ' ')"
          if [ "$count" -eq 0 ]; then
            echo "No blob reports found under artifacts/. Expected vitest-blob-*/blob-*.json."
            exit 1
          fi
          echo "Found $count blob report(s)."

      - name: Merge reports + coverage gate
        shell: bash
        run: pnpm exec vitest --mergeReports vitest-reports --coverage.enabled --coverage.reporter=text-summary --coverage.reporter=json

      - name: Coverage by component
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Coverage (ubuntu-latest)"
            echo ""
            node scripts/coverage/components.mjs
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-report-ubuntu
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  desktop-cross-platform-build:
    name: Desktop Cross-Platform Build (${{ matrix.os }})
    needs: [changes, linux-foundation]
    if: needs.linux-foundation.result == 'success' && needs.changes.outputs.desktop_ci == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure node-gyp to use local headers (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          node_prefix="$(dirname "$(dirname "$(command -v node)")")"
          echo "npm_config_nodedir=$node_prefix" >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile

      - name: Build desktop test dependencies
        run: pnpm --filter tyrum-desktop build:test-deps

      - name: Build desktop release files
        env:
          CSC_FOR_PULL_REQUEST: ${{ matrix.os == 'macos-latest' && 'true' || 'false' }}
        run: pnpm --filter tyrum-desktop dist

      - name: Mark packaged desktop bundle ready for smoke reuse
        run: node apps/desktop/scripts/write-packaged-smoke-stamp.mjs

      - name: Stage desktop build artifact
        run: node scripts/ci/stage-build-artifact.mjs --group desktop-suite-builds --artifact-dir .ci-artifacts/desktop-suite-builds

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: desktop-suite-build-${{ matrix.os }}
          path: .ci-artifacts/desktop-suite-builds
          if-no-files-found: error
          retention-days: 7

  desktop-cross-platform-test:
    name: Desktop Cross-Platform Test (${{ matrix.os }})
    needs: [changes, linux-foundation, desktop-cross-platform-build]
    if: needs.linux-foundation.result == 'success' && needs.desktop-cross-platform-build.result == 'success' && needs.changes.outputs.desktop_ci == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure node-gyp to use local headers (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          node_prefix="$(dirname "$(dirname "$(command -v node)")")"
          echo "npm_config_nodedir=$node_prefix" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: desktop-suite-build-${{ matrix.os }}
          path: .ci-artifacts/desktop-suite-builds

      - name: Restore desktop build artifact
        run: node scripts/ci/restore-build-artifact.mjs --group desktop-suite-builds --artifact-dir .ci-artifacts/desktop-suite-builds

      - name: Verify restored macOS app signature
        if: matrix.os == 'macos-latest'
        run: codesign --verify --deep --strict apps/desktop/release/mac-arm64/Tyrum.app

      - name: Install workspace dependencies
        # Restore workspace build outputs before pnpm links workspace packages so
        # package-local runtime imports can see the restored dist trees too.
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter tyrum-desktop exec playwright install chromium

      - name: Test desktop suite
        env:
          TYRUM_RUN_PACKAGED_SMOKE: "1"
          TYRUM_TRUST_PACKAGED_SMOKE_ARTIFACT: "1"
          CSC_FOR_PULL_REQUEST: ${{ matrix.os == 'macos-latest' && 'true' || 'false' }}
        run: pnpm exec vitest run apps/desktop/tests --passWithNoTests

  mobile-native-ios:
    name: Mobile Native iOS (macos-latest)
    needs: [changes, linux-foundation]
    if: needs.linux-foundation.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure node-gyp to use local headers (macOS)
        shell: bash
        run: |
          set -euo pipefail
          node_prefix="$(dirname "$(dirname "$(command -v node)")")"
          echo "npm_config_nodedir=$node_prefix" >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile

      - name: Sync native iOS project
        run: pnpm --filter @tyrum/mobile ios:sync

      - name: Verify tracked iOS scaffolding is current
        shell: bash
        run: git diff --exit-code -- apps/mobile/ios

      - name: Reset SwiftPM binary artifact cache
        shell: bash
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

      - name: Build iOS simulator target
        run: pnpm --filter @tyrum/mobile exec node ./scripts/build-ios.mjs

  mobile-native-android:
    name: Mobile Native Android (ubuntu-latest)
    needs: [changes, linux-foundation]
    if: needs.linux-foundation.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@651bceb6f9ca583f16b8d75b62c36ded2ae6fc9c # v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          (yes 2>/dev/null || true) | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "build-tools;36.0.0" "platforms;android-36"

      - run: pnpm install --frozen-lockfile

      - name: Sync native Android project
        run: pnpm --filter @tyrum/mobile android:sync

      - name: Verify tracked Android scaffolding is current
        shell: bash
        run: git diff --exit-code -- apps/mobile/android

      - name: Build Android debug APK
        run: pnpm --filter @tyrum/mobile exec node ./scripts/build-android.mjs

  reference-deployment-smoke:
    name: Reference Deployment Smoke (Docker)
    needs: changes
    if: needs.changes.outputs.deployment_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Smoke (single-host, SQLite)
        shell: bash
        run: bash scripts/smoke-sqlite-single-host.sh

      - name: Smoke (split-role, Postgres)
        shell: bash
        run: bash scripts/smoke-postgres-split.sh
