name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packages:
    name: Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install

      - name: Install Playwright (Chromium + system deps)
        run: pnpm --filter tyrum-desktop exec playwright install --with-deps chromium

      - run: pnpm typecheck

      - name: Test (virtual display)
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" pnpm test -- --coverage

      - run: pnpm lint

      - run: pnpm build

  desktop-cross-os:
    name: Desktop + Packages Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install

      - name: Build shared test dependencies
        run: pnpm run pretest

      - name: Test packages suite
        run: pnpm exec vitest run packages --passWithNoTests

      - name: Install Playwright (Chromium)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            pnpm --filter tyrum-desktop exec playwright install --with-deps chromium
          else
            pnpm --filter tyrum-desktop exec playwright install chromium
          fi

      - name: Test desktop suite
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            xvfb-run -a --server-args="-screen 0 1920x1080x24" pnpm exec vitest run apps/desktop/tests --passWithNoTests
          else
            pnpm exec vitest run apps/desktop/tests --passWithNoTests
          fi
