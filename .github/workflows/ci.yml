name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
      scripts: ${{ steps.filter.outputs.scripts }}
      docs_gate: ${{ steps.filter.outputs.docs_gate }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflows:
              - ".github/workflows/**"
              - ".github/actions/**"
            scripts:
              - "scripts/**"
              - ".github/scripts/**"
            docs_gate:
              - "docs/**"
              - "apps/docs/**"
              - "README.md"
              - "scripts/check-public-docs.sh"
            deps:
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "patches/**"
              - "packages/**/package.json"
              - "apps/**/package.json"
            ci:
              - "packages/**"
              - "apps/desktop/**"
              - "apps/mobile/**"
              - "apps/web/**"
              - "apps/docs/**"
              - "config/**"
              - "web/**"
              - "patches/**"
              - "Dockerfile"
              - "docker-compose.yml"
              - ".oxlintrc.json"
              - ".oxlintrc.new-files.json"
              - "tsconfig.json"
              - "tsconfig.base.json"
              - "vitest.config.ts"
              - ".node-version"
              - ".nvmrc"

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:1.7.11

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Ensure shellcheck is available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes shellcheck
          fi
      - name: Lint shell scripts
        run: shellcheck scripts/install.sh scripts/check-public-docs.sh scripts/smoke-postgres-split.sh scripts/smoke-sqlite-single-host.sh

  docs-public-content:
    name: Docs Public Content Gate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_gate == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Check docs for internal-only content
        run: bash scripts/check-public-docs.sh

  dependency-review:
    name: Dependency Review
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4

  pr-overwrite-analyzer:
    name: PR Overwrite Analyzer
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Analyze current PR for overwritten merged changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          node scripts/report-rebased-pr-overwrites.mjs
          --pr "${{ github.event.pull_request.number }}"
          --json
          > pr-overwrite-analysis.json

      - name: Append analyzer summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f pr-overwrite-analysis.json ]; then
            {
              echo "## PR Overwrite Analyzer"
              echo ""
              echo "Analyzer output was not produced. Check the job logs."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node --input-type=module <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import { readFileSync } from "node:fs";
          import { toMarkdownReport } from "./scripts/report-rebased-pr-overwrites.mjs";

          const report = JSON.parse(readFileSync("pr-overwrite-analysis.json", "utf8"));
          process.stdout.write(toMarkdownReport(report));
          EOF

      - name: Sync PR analyzer comment
        if: always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const { readFileSync, existsSync } = require('node:fs');
            const { pathToFileURL } = require('node:url');
            const isPermissionError = (error) =>
              error?.status === 403 &&
              /Resource not accessible by integration/i.test(String(error.message ?? ''));

            try {
              if (!existsSync('pr-overwrite-analysis.json')) {
                core.info('Analyzer output was not produced; leaving existing PR comment unchanged.');
                return;
              }

              const marker = '<!-- pr-overwrite-analyzer -->';
              const reportModule = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/report-rebased-pr-overwrites.mjs`).href);
              const report = JSON.parse(readFileSync('pr-overwrite-analysis.json', 'utf8'));
              const { owner, repo } = context.repo;
              const issue_number = context.payload.pull_request.number;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));

              if (report.pairCount === 0) {
                if (existing) {
                  await github.rest.issues.deleteComment({
                    owner,
                    repo,
                    comment_id: existing.id,
                  });
                  core.info(`Deleted stale PR overwrite analyzer comment ${existing.id}.`);
                } else {
                  core.info('No analyzer findings and no existing sticky comment to delete.');
                }
                return;
              }

              const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
              const body = [
                marker,
                reportModule.toMarkdownReport(report).trimEnd(),
                '',
                `Run: ${runUrl}`,
              ].join('\n');

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
                core.info(`Updated PR overwrite analyzer comment ${existing.id}.`);
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info('Created PR overwrite analyzer comment.');
            } catch (error) {
              if (isPermissionError(error)) {
                core.warning(`Skipping PR analyzer comment sync: ${error.message}`);
                return;
              }
              throw error;
            }

      - name: Upload analyzer artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-overwrite-analysis
          path: pr-overwrite-analysis.json
          if-no-files-found: ignore
          retention-days: 7

  validation:
    name: Validation (ubuntu-latest)
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: New-file lint gates (PR)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --no-tags --prune --unshallow
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            base="$(git rev-parse HEAD^1)"
          fi
          node scripts/lint/oxlint-new-files.mjs --base "$base"

      - name: Oxlint report (warn)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: pnpm lint:oxlint:report

      - name: Typecheck (packages)
        run: pnpm typecheck

      - name: Typecheck (desktop app)
        run: pnpm exec tsc --noEmit --project apps/desktop/tsconfig.json

      - name: Lint
        run: pnpm lint

      - name: Prettier format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: A11y (operator-ui)
        run: pnpm test:a11y:operator-ui

  test-shards:
    name: Test shards (ubuntu-latest) (${{ matrix.shard }}/4)
    needs: [changes, validation]
    if: needs.validation.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Playwright browsers (Chromium)
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        shell: bash
        run: pnpm --filter tyrum-desktop exec playwright install --with-deps chromium

      - name: Test (shard) + blob report
        env:
          VITEST_SHARD_RUN: "1"
        run: >
          xvfb-run -a --server-args="-screen 0 1920x1080x24"
          pnpm test
          --passWithNoTests
          --exclude=apps/web/tests/layout-regression.test.ts
          --shard=${{ matrix.shard }}/4
          --reporter=blob
          --outputFile=vitest-reports/blob-${{ matrix.shard }}.json
          --coverage.enabled
          --coverage.reporter=json

      - name: Upload vitest blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: vitest-reports/blob-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 7

  layout-regression:
    name: Layout Regression (ubuntu-latest)
    needs: [changes, validation]
    if: needs.validation.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Playwright browsers (Chromium)
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        shell: bash
        run: pnpm --filter tyrum-desktop exec playwright install --with-deps chromium

      - name: Run layout regression suite
        run: pnpm vitest run apps/web/tests/layout-regression.test.ts

  test-merge:
    name: Test + coverage (merge) (ubuntu-latest)
    needs: [changes, validation, test-shards, layout-regression]
    if: needs.validation.result == 'success' && needs.test-shards.result == 'success' && needs.layout-regression.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Download shard reports
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect blob reports
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vitest-reports
          find artifacts -type f -name 'blob-*.json' -print -exec cp {} vitest-reports/ \;
          count="$(find vitest-reports -maxdepth 1 -type f -name 'blob-*.json' | wc -l | tr -d ' ')"
          if [ "$count" -eq 0 ]; then
            echo "No blob reports found under artifacts/. Expected vitest-blob-*/blob-*.json."
            exit 1
          fi
          echo "Found $count blob report(s)."

      - name: Merge reports + coverage gate
        shell: bash
        run: pnpm exec vitest --mergeReports vitest-reports --coverage.enabled --coverage.reporter=text-summary --coverage.reporter=json

      - name: Coverage by component
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Coverage (ubuntu-latest)"
            echo ""
            node scripts/coverage/components.mjs
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-ubuntu
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  desktop-suite:
    name: Desktop Suite (${{ matrix.os }})
    needs: [changes, validation, test-merge]
    if: needs.validation.result == 'success' && needs.test-merge.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure node-gyp to use local headers (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          node_prefix="$(dirname "$(dirname "$(command -v node)")")"
          echo "npm_config_nodedir=$node_prefix" >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile

      - name: Build desktop type dependencies
        run: pnpm --filter @tyrum/schemas build && pnpm --filter @tyrum/client build && pnpm --filter @tyrum/operator-core build && pnpm --filter @tyrum/operator-ui build && pnpm --filter @tyrum/desktop-node build

      - name: Build desktop app
        run: pnpm --filter tyrum-desktop build

      - name: Install Playwright (Chromium)
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            pnpm --filter tyrum-desktop exec playwright install --with-deps chromium
          else
            pnpm --filter tyrum-desktop exec playwright install chromium
          fi

      - name: Test desktop suite
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            xvfb-run -a --server-args="-screen 0 1920x1080x24" pnpm exec vitest run apps/desktop/tests --passWithNoTests
          else
            pnpm exec vitest run apps/desktop/tests --passWithNoTests
          fi

  mobile-native-ios:
    name: Mobile Native iOS (macos-latest)
    needs: [changes, validation]
    if: needs.validation.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure node-gyp to use local headers (macOS)
        shell: bash
        run: |
          set -euo pipefail
          node_prefix="$(dirname "$(dirname "$(command -v node)")")"
          echo "npm_config_nodedir=$node_prefix" >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile

      - name: Typecheck mobile app
        run: pnpm --filter @tyrum/mobile typecheck

      - name: Test mobile app
        run: pnpm --filter @tyrum/mobile test

      - name: Sync native iOS project
        run: pnpm --filter @tyrum/mobile ios:sync

      - name: Verify tracked iOS scaffolding is current
        shell: bash
        run: git diff --exit-code -- apps/mobile/ios

      - name: Build iOS simulator target
        run: pnpm --filter @tyrum/mobile exec node ./scripts/build-ios.mjs

  mobile-native-android:
    name: Mobile Native Android (ubuntu-latest)
    needs: [changes, validation]
    if: needs.validation.result == 'success' && (needs.changes.outputs.ci == 'true' || needs.changes.outputs.deps == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "build-tools;36.0.0" "platforms;android-36"

      - run: pnpm install --frozen-lockfile

      - name: Typecheck mobile app
        run: pnpm --filter @tyrum/mobile typecheck

      - name: Test mobile app
        run: pnpm --filter @tyrum/mobile test

      - name: Sync native Android project
        run: pnpm --filter @tyrum/mobile android:sync

      - name: Verify tracked Android scaffolding is current
        shell: bash
        run: git diff --exit-code -- apps/mobile/android

      - name: Build Android debug APK
        run: pnpm --filter @tyrum/mobile exec node ./scripts/build-android.mjs

  reference-deployment-smoke:
    name: Reference Deployment Smoke (Docker)
    needs: changes
    if: needs.changes.outputs.ci == 'true' || needs.changes.outputs.scripts == 'true' || needs.changes.outputs.workflows == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Smoke (single-host, SQLite)
        shell: bash
        run: bash scripts/smoke-sqlite-single-host.sh

      - name: Smoke (split-role, Postgres)
        shell: bash
        run: bash scripts/smoke-postgres-split.sh
