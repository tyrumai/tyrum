name: mirror-base-images

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    name: Mirror external base images to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror and push images
        shell: bash
        run: |
          set -euo pipefail

          images=(
            "docker.io/library/rust:1.90|ghcr.io/rhernaus/base-images/rust:1.90"
            "docker.io/library/debian:bookworm-slim|ghcr.io/rhernaus/base-images/debian:bookworm-slim"
            "docker.io/library/python:3.12-slim|ghcr.io/rhernaus/base-images/python:3.12-slim"
            "docker.io/library/python:3.11-slim|ghcr.io/rhernaus/base-images/python:3.11-slim"
            "docker.io/library/node:20-bullseye|ghcr.io/rhernaus/base-images/node:20-bullseye"
            "mcr.microsoft.com/playwright:v1.56.1-jammy|ghcr.io/rhernaus/base-images/playwright:v1.56.1-jammy"
            "docker.io/pgvector/pgvector:pg16|ghcr.io/rhernaus/base-images/pgvector-pg16:pg16"
          )

          for mapping in "${images[@]}"; do
            source="${mapping%%|*}"
            target="${mapping##*|}"
            echo "Mirroring ${source} -> ${target}"
            docker pull "$source"
            docker tag "$source" "$target"
            docker push "$target"
          done
