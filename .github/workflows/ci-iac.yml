name: ci-iac

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iac:
    name: Infrastructure validation
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "0"
      KUBECONFORM_VERSION: "0.6.7"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect infrastructure assets
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          terraform_files=$(git ls-files '*.tf' '*.tfvars' 2>/dev/null || true)
          compose_files=$(git ls-files '*docker-compose*.yml' '*docker-compose*.yaml' 'docker-compose.yml' 2>/dev/null || true)
          kube_files=$(git ls-files 2>/dev/null \
            | grep -E '(^infra/.*\.ya?ml$|/k8s/.*\.ya?ml$|/manifests/.*\.ya?ml$)' \
            | grep -Ev '^infra/docker-compose\.ya?ml$' \
            | grep -Ev '^infra/helm/' || true)

          if [ -n "$terraform_files" ]; then
            echo "has-terraform=true" >>"$GITHUB_OUTPUT"
            {
              printf 'terraform_files<<EOF\n'
              printf '%s\n' "$terraform_files"
              printf 'EOF\n'
            } >>"$GITHUB_OUTPUT"

            declare -A terraform_dir_map=()
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              dir=$(dirname "$file")
              terraform_dir_map["$dir"]=1
            done <<<"$terraform_files"

            if [ "${#terraform_dir_map[@]}" -gt 0 ]; then
              {
                printf 'terraform_dirs<<EOF\n'
                for dir in "${!terraform_dir_map[@]}"; do
                  printf '%s\n' "$dir"
                done | sort
                printf 'EOF\n'
              } >>"$GITHUB_OUTPUT"
            else
              echo "terraform_dirs=" >>"$GITHUB_OUTPUT"
            fi
          else
            echo "has-terraform=false" >>"$GITHUB_OUTPUT"
            echo "terraform_files=" >>"$GITHUB_OUTPUT"
            echo "terraform_dirs=" >>"$GITHUB_OUTPUT"
          fi

          if [ -n "$compose_files" ]; then
            echo "has-compose=true" >>"$GITHUB_OUTPUT"
            {
              printf 'compose_files<<EOF\n'
              printf '%s\n' "$compose_files"
              printf 'EOF\n'
            } >>"$GITHUB_OUTPUT"
          else
            echo "has-compose=false" >>"$GITHUB_OUTPUT"
            echo "compose_files=" >>"$GITHUB_OUTPUT"
          fi

          if [ -n "$kube_files" ]; then
            echo "has-kube=true" >>"$GITHUB_OUTPUT"
            {
              printf 'kube_files<<EOF\n'
              printf '%s\n' "$kube_files"
              printf 'EOF\n'
            } >>"$GITHUB_OUTPUT"
          else
            echo "has-kube=false" >>"$GITHUB_OUTPUT"
            echo "kube_files=" >>"$GITHUB_OUTPUT"
          fi

          if [ -n "$terraform_files" ] || [ -n "$compose_files" ] || [ -n "$kube_files" ]; then
            echo "should-run=true" >>"$GITHUB_OUTPUT"
          else
            echo "should-run=false" >>"$GITHUB_OUTPUT"
          fi

      - name: No IaC assets detected
        if: steps.detect.outputs.should-run != 'true'
        run: echo "No IaC sources detected; skipping infrastructure validation." >>"$GITHUB_STEP_SUMMARY"

      - name: Setup Terraform
        if: steps.detect.outputs.has-terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3
          terraform_wrapper: false

      - name: Setup TFLint
        if: steps.detect.outputs.has-terraform == 'true'
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Terraform fmt
        if: steps.detect.outputs.has-terraform == 'true'
        shell: bash
        run: |
          set -euo pipefail
          terraform fmt -check -recursive

      - name: Terraform validate
        if: steps.detect.outputs.has-terraform == 'true'
        shell: bash
        env:
          TERRAFORM_DIRS: ${{ steps.detect.outputs.terraform_dirs }}
        run: |
          set -euo pipefail
          mapfile -t terraform_dirs <<<"${TERRAFORM_DIRS:-}"

          filtered_dirs=()
          for dir in "${terraform_dirs[@]}"; do
            dir="${dir%$'\r'}"
            [ -n "$dir" ] || continue
            filtered_dirs+=("$dir")
          done

          terraform_dirs=("${filtered_dirs[@]}")
          if [ "${#terraform_dirs[@]}" -eq 0 ]; then
            echo "No Terraform modules detected after discovery." >&2
            exit 0
          fi

          for dir in "${terraform_dirs[@]}"; do
            [ -n "$dir" ] || continue
            echo "Validating Terraform module: $dir"
            (cd "$dir" && terraform init -backend=false -input=false >/dev/null)
            (cd "$dir" && terraform validate)
          done

      - name: TFLint
        if: steps.detect.outputs.has-terraform == 'true'
        shell: bash
        env:
          TERRAFORM_DIRS: ${{ steps.detect.outputs.terraform_dirs }}
        run: |
          set -euo pipefail
          mapfile -t terraform_dirs <<<"${TERRAFORM_DIRS:-}"

          filtered_dirs=()
          for dir in "${terraform_dirs[@]}"; do
            dir="${dir%$'\r'}"
            [ -n "$dir" ] || continue
            filtered_dirs+=("$dir")
          done

          terraform_dirs=("${filtered_dirs[@]}")
          if [ "${#terraform_dirs[@]}" -eq 0 ]; then
            echo "No Terraform modules detected after discovery." >&2
            exit 0
          fi

          for dir in "${terraform_dirs[@]}"; do
            [ -n "$dir" ] || continue
            echo "Linting Terraform module: $dir"
            (cd "$dir" && tflint --init >/dev/null)
            (cd "$dir" && tflint)
          done

      - name: docker compose config
        if: steps.detect.outputs.has-compose == 'true'
        shell: bash
        env:
          COMPOSE_FILES: ${{ steps.detect.outputs.compose_files }}
        run: |
          set -euo pipefail
          mapfile -t compose_files <<<"${COMPOSE_FILES:-}"

          filtered_compose=()
          for compose_file in "${compose_files[@]}"; do
            compose_file="${compose_file%$'\r'}"
            [ -n "$compose_file" ] || continue
            filtered_compose+=("$compose_file")
          done

          compose_files=("${filtered_compose[@]}")
          if [ "${#compose_files[@]}" -eq 0 ]; then
            echo "No Docker Compose files found after discovery." >&2
            exit 0
          fi

          declare -A seen=()
          for compose_file in "${compose_files[@]}"; do
            [ -n "$compose_file" ] || continue
            [ -f "$compose_file" ] || continue
            if [ -n "${seen["$compose_file"]:-}" ]; then
              continue
            fi
            seen["$compose_file"]=1
            echo "Validating $compose_file"
            docker compose -f "$compose_file" config >/dev/null
          done

      - name: Install kubeconform
        if: steps.detect.outputs.has-kube == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSLo kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz kubeconform
          mv kubeconform "$HOME/.local/bin/kubeconform"
          chmod +x "$HOME/.local/bin/kubeconform"
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"
          rm -f kubeconform.tar.gz

      - name: kubeconform manifests
        if: steps.detect.outputs.has-kube == 'true'
        shell: bash
        env:
          KUBE_FILES: ${{ steps.detect.outputs.kube_files }}
        run: |
          set -euo pipefail
          mapfile -t kube_files <<<"${KUBE_FILES:-}"

          filtered=()
          for manifest in "${kube_files[@]}"; do
            manifest="${manifest%$'\r'}"
            [ -n "$manifest" ] || continue
            [ -f "$manifest" ] || continue
            filtered+=("$manifest")
          done

          if [ "${#filtered[@]}" -eq 0 ]; then
            echo "No Kubernetes manifests found after filtering."
            exit 0
          fi

          kubeconform --strict "${filtered[@]}"
