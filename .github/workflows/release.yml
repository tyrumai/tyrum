name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  actions: read

env:
  NODE_VERSION: 24

jobs:
  architecture-parity-gate:
    name: Architecture Parity Gate (CI)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wait for CI parity checks to succeed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for ci.yml to succeed for ${GITHUB_REPOSITORY}@${GITHUB_SHA}"

          deadline=$((SECONDS + 1800))
          while true; do
            if ((SECONDS > deadline)); then
              echo "Timed out waiting for CI parity checks."
              exit 1
            fi

            run="$(
              gh api -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&event=push&head_sha=${GITHUB_SHA}&per_page=1" \
                --jq ".workflow_runs[0]"
            )"

            if [[ -z "${run}" || "${run}" == "null" ]]; then
              echo "No ci.yml workflow run found yet for ${GITHUB_SHA}; waiting..."
              sleep 20
              continue
            fi

            status="$(jq -r ".status" <<<"${run}")"
            conclusion="$(jq -r ".conclusion" <<<"${run}")"
            url="$(jq -r ".html_url" <<<"${run}")"

            echo "ci.yml: status=${status} conclusion=${conclusion} url=${url}"

            if [[ "${status}" != "completed" ]]; then
              sleep 20
              continue
            fi

            if [[ "${conclusion}" == "success" ]]; then
              echo "CI parity checks succeeded."
              exit 0
            fi

            echo "CI parity checks did not succeed (conclusion=${conclusion})."
            exit 1
          done

  package-bundles:
    name: Package Bundles
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [architecture-parity-gate]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(-(beta|dev)\.[0-9]+)?$ ]]; then
            echo "Invalid tag format: ${TAG}"
            echo "Expected: vYYYY.M.D, vYYYY.M.D-beta.N, or vYYYY.M.D-dev.N"
            exit 1
          fi

          VERSION="${TAG#v}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            if [[ "$TAG" == *"-beta."* ]]; then
              echo "channel=beta"
              echo "npm_tag=next"
              echo "prerelease=true"
            elif [[ "$TAG" == *"-dev."* ]]; then
              echo "channel=dev"
              echo "npm_tag=dev"
              echo "prerelease=true"
            else
              echo "channel=stable"
              echo "npm_tag=latest"
              echo "prerelease=false"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Apply tag version to workspace manifests
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";
          import { join } from "node:path";

          const version = process.env.RELEASE_VERSION;
          if (!version) {
            throw new Error("RELEASE_VERSION is required");
          }

          const manifestPaths = [
            "packages/contracts/package.json",
            "packages/transport-sdk/package.json",
            "packages/node-sdk/package.json",
            "packages/gateway/package.json",
          ];

          const workspacePackageNames = new Set();
          const manifests = [];

          for (const relativePath of manifestPaths) {
            const absolutePath = join(process.cwd(), relativePath);
            const manifest = JSON.parse(readFileSync(absolutePath, "utf8"));
            manifest.version = version;
            manifests.push({ relativePath, absolutePath, manifest });
            if (typeof manifest.name === "string") {
              workspacePackageNames.add(manifest.name);
            }
          }

          const dependencyFields = [
            "dependencies",
            "devDependencies",
            "peerDependencies",
            "optionalDependencies",
          ];

          for (const entry of manifests) {
            for (const field of dependencyFields) {
              const deps = entry.manifest[field];
              if (!deps || typeof deps !== "object") continue;
              for (const depName of Object.keys(deps)) {
                if (!workspacePackageNames.has(depName)) continue;
                deps[depName] = version;
              }
            }

            writeFileSync(entry.absolutePath, `${JSON.stringify(entry.manifest, null, 2)}\n`);
            console.log(`Updated ${entry.relativePath} -> ${version}`);
          }
          EOF

      - name: Build publishable workspace packages
        run: |
          pnpm --filter @tyrum/gateway... build
          pnpm --filter @tyrum/node-sdk... build

      - name: Pack npm tarballs
        run: |
          mkdir -p artifacts/npm
          (cd packages/contracts && pnpm pack --pack-destination ../../artifacts/npm)
          (cd packages/transport-sdk && pnpm pack --pack-destination ../../artifacts/npm)
          (cd packages/node-sdk && pnpm pack --pack-destination ../../artifacts/npm)
          (cd packages/gateway && pnpm pack --pack-destination ../../artifacts/npm)
          ls -lah artifacts/npm

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: npm-packages
          path: artifacts/npm/*.tgz
          if-no-files-found: error
          retention-days: 14

  desktop-bundles:
    name: Desktop Bundles (${{ matrix.os }})
    needs: package-bundles
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Apply release version to desktop manifest
        env:
          RELEASE_VERSION: ${{ needs.package-bundles.outputs.version }}
        shell: bash
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";
          const version = process.env.RELEASE_VERSION;
          if (!version) {
            throw new Error("RELEASE_VERSION is required");
          }

          const path = "apps/desktop/package.json";
          const pkg = JSON.parse(readFileSync(path, "utf8"));

          pkg.version = version;

          writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          console.log(`Updated ${path} -> ${pkg.version}`);
          EOF

      - name: Build desktop test dependencies
        run: pnpm --filter tyrum-desktop build:test-deps

      - name: Prepare App Store Connect API key file
        if: ${{ matrix.os == 'macos-latest' }}
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail

          source "${GITHUB_WORKSPACE}/.github/scripts/decode-base64.sh"

          if [[ -z "${APPLE_API_KEY:-}" ]]; then
            exit 0
          fi

          if [[ -f "${APPLE_API_KEY}" ]]; then
            echo "APPLE_API_KEY=${APPLE_API_KEY}" >> "$GITHUB_ENV"
            exit 0
          fi

          key_file="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID:-ci}.p8"
          if printf '%s' "${APPLE_API_KEY}" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s' "${APPLE_API_KEY}" > "${key_file}"
          elif decode_base64 "${APPLE_API_KEY}" "${key_file}"; then
            if ! grep -q "BEGIN PRIVATE KEY" "${key_file}"; then
              printf '%s' "${APPLE_API_KEY}" > "${key_file}"
            fi
          else
            printf '%s' "${APPLE_API_KEY}" > "${key_file}"
          fi

          chmod 600 "${key_file}"
          echo "APPLE_API_KEY=${key_file}" >> "$GITHUB_ENV"

      - name: Validate macOS signing and notarization credentials
        if: ${{ matrix.os == 'macos-latest' }}
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
        run: |
          set -euo pipefail

          missing=0
          for var in CSC_LINK CSC_KEY_PASSWORD KEYCHAIN_PASSWORD; do
            if [[ -z "${!var:-}" ]]; then
              echo "Missing required secret: ${var}"
              missing=1
            fi
          done

          has_api_key_auth=0
          if [[ -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
            has_api_key_auth=1
          fi

          has_apple_id_auth=0
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            has_apple_id_auth=1
          fi

          has_keychain_auth=0
          if [[ -n "${APPLE_KEYCHAIN:-}" && -n "${APPLE_KEYCHAIN_PROFILE:-}" ]]; then
            has_keychain_auth=1
          fi

          if [[ "${has_api_key_auth}" -eq 0 && "${has_apple_id_auth}" -eq 0 && "${has_keychain_auth}" -eq 0 ]]; then
            echo "Missing notarization credentials. Configure either:"
            echo "- APPLE_API_KEY + APPLE_API_KEY_ID + APPLE_API_ISSUER"
            echo "- APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID"
            echo "- APPLE_KEYCHAIN + APPLE_KEYCHAIN_PROFILE"
            missing=1
          fi

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Set up keychain for macOS signing
        if: ${{ matrix.os == 'macos-latest' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          source "${GITHUB_WORKSPACE}/.github/scripts/decode-base64.sh"

          keychain_path="${RUNNER_TEMP}/ci-signing.keychain-db"
          cert_file="${RUNNER_TEMP}/codesign-cert.p12"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          security default-keychain -d user -s "${keychain_path}"

          if [[ "${CSC_LINK}" =~ ^https?:// ]]; then
            curl --fail --location --silent --show-error "${CSC_LINK}" --output "${cert_file}"
          elif [[ "${CSC_LINK}" =~ ^file:// ]]; then
            cp "${CSC_LINK#file://}" "${cert_file}"
          elif [[ -f "${CSC_LINK}" ]]; then
            cp "${CSC_LINK}" "${cert_file}"
          elif decode_base64 "${CSC_LINK}" "${cert_file}"; then
            :
          else
            echo "Unable to resolve CSC_LINK into a certificate file."
            exit 1
          fi

          chmod 600 "${cert_file}"
          security import "${cert_file}" -k "${keychain_path}" -P "${CSC_KEY_PASSWORD}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}"

          echo "CSC_KEYCHAIN=${keychain_path}" >> "$GITHUB_ENV"

      - name: Build desktop release files (macOS signed + notarized)
        if: ${{ matrix.os == 'macos-latest' }}
        timeout-minutes: 90
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
          DEBUG: electron-builder,electron-osx-sign,electron-notarize
        run: pnpm --filter tyrum-desktop dist

      - name: Build desktop release files (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: pnpm --filter tyrum-desktop dist

      - name: Build desktop release files (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm --filter tyrum-desktop dist

      - name: Smoke test packaged desktop app
        shell: bash
        env:
          TYRUM_RUN_PACKAGED_SMOKE: "1"
        run: |
          set -euo pipefail
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            bash scripts/xvfb-run-safe.sh -a --server-args="-screen 0 1920x1080x24" -- \
              pnpm exec vitest run apps/desktop/tests/integration/electron-process-smoke.test.ts \
              -t "launches the packaged desktop app and starts the embedded gateway"
          else
            pnpm exec vitest run apps/desktop/tests/integration/electron-process-smoke.test.ts \
              -t "launches the packaged desktop app and starts the embedded gateway"
          fi

      - name: Stage desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/desktop
          found=0
          while IFS= read -r -d '' file; do
            cp "$file" artifacts/desktop/
            found=1
          done < <(find apps/desktop/release -type f -print0)

          if [[ "$found" -eq 0 ]]; then
            echo "No desktop artifacts found under apps/desktop/release"
            exit 1
          fi

          ls -lah artifacts/desktop

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: desktop-${{ matrix.os }}
          path: artifacts/desktop/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish Release
    needs: [package-bundles, desktop-bundles]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-packages
          path: release-assets

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true

      - name: Include installer script
        run: cp scripts/install.sh release-assets/install.sh

      - name: Generate SHA256 sums
        run: |
          set -euo pipefail
          cd release-assets
          find . -type f -printf '%P\0' \
            | LC_ALL=C sort -z \
            | xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Publish npm packages
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.package-bundles.outputs.npm_tag }}
          RELEASE_VERSION: ${{ needs.package-bundles.outputs.version }}
        run: |
          set -euo pipefail

          echo "Publishing with NPM_TOKEN. Switch back to trusted publishing once the packages exist on npm."

          declare -A packages=(
            ["@tyrum/contracts"]="release-assets/tyrum-contracts-${RELEASE_VERSION}.tgz"
            ["@tyrum/transport-sdk"]="release-assets/tyrum-transport-sdk-${RELEASE_VERSION}.tgz"
            ["@tyrum/node-sdk"]="release-assets/tyrum-node-sdk-${RELEASE_VERSION}.tgz"
            ["@tyrum/gateway"]="release-assets/tyrum-gateway-${RELEASE_VERSION}.tgz"
          )

          for package_name in "${!packages[@]}"; do
            package_file="${packages[${package_name}]}"
            if [[ ! -f "${package_file}" ]]; then
              echo "Missing package tarball: ${package_file}"
              exit 1
            fi

            if npm view "${package_name}@${RELEASE_VERSION}" version >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${RELEASE_VERSION} (already published)"
              continue
            fi

            echo "Publishing ${package_name}@${RELEASE_VERSION} with dist-tag ${NPM_DIST_TAG}"
            npm publish "${package_file}" --access public --tag "${NPM_DIST_TAG}" --provenance
          done

      - name: Skip npm publish (token missing)
        if: ${{ env.HAS_NPM_TOKEN != 'true' }}
        run: echo "NPM_TOKEN is not set; skipping npm publish."

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.package-bundles.outputs.tag }}
          name: tyrum ${{ needs.package-bundles.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.package-bundles.outputs.prerelease == 'true' }}
          files: |
            release-assets/*
