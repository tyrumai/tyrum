name: ci-containers

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  containers:
    name: Build and smoke test ${{ matrix.title }} image
    runs-on: [self-hosted, Linux, X64]
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: api
            title: API
            context: .
            dockerfile: Dockerfile.api
            port: 8080
            endpoint: /healthz
          - id: policy
            title: Policy
            context: .
            dockerfile: Dockerfile.policy
            port: 8081
            endpoint: /healthz
          - id: web
            title: Web
            context: web
            dockerfile: web/Dockerfile
            port: 3000
            endpoint: /
          - id: mock-llm
            title: Mock LLM
            context: services/mock_llm
            dockerfile: services/mock_llm/Dockerfile
            port: 8085
            endpoint: /healthz
    permissions:
      contents: read
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Docker Hub
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build ${{ matrix.title }} image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/virtunetbv/tyrum-ci-${{ matrix.id }}:${GITHUB_SHA}"
          docker buildx build --progress plain --load \
            --file "${{ matrix.dockerfile }}" \
            --tag "$image" \
            "${{ matrix.context }}"
          echo "BUILT_IMAGE=$image" >>"$GITHUB_ENV"

      - name: Smoke test ${{ matrix.title }} image
        shell: bash
        run: |
          set -euo pipefail
          image="${BUILT_IMAGE:?missing image tag}"
          network=""
          db_container=""

          if [ "${{ matrix.id }}" = "api" ]; then
            network="smoke-net-${GITHUB_SHA}-${RANDOM}"
            docker network create "$network" >/dev/null

            db_container="smoke-postgres-${GITHUB_SHA}-${RANDOM}"
            docker run -d \
              --name "$db_container" \
              --network "$network" \
              -e POSTGRES_USER=tyrum \
              -e POSTGRES_PASSWORD=tyrum_dev_password \
              -e POSTGRES_DB=tyrum_dev \
              pgvector/pgvector:pg16 >/dev/null

            for attempt in $(seq 1 40); do
              if docker exec "$db_container" pg_isready -U tyrum -d tyrum_dev >/dev/null 2>&1; then
                break
              fi
              if [ "$attempt" -eq 40 ]; then
                echo "Postgres container did not become ready" >&2
                docker logs "$db_container" || true
                exit 1
              fi
              sleep 2
            done

            database_url="postgres://tyrum:tyrum_dev_password@$db_container:5432/tyrum_dev"
            container_id="$(docker run -d \
              --network "$network" \
              -e DATABASE_URL="$database_url" \
              -e TELEGRAM_WEBHOOK_SECRET=ci-telegram-webhook-secret \
              -p 0:${{ matrix.port }} "$image")"
          else
            container_id="$(docker run -d -p 0:${{ matrix.port }} "$image")"
          fi

          cleanup() {
            docker rm -f "$container_id" >/dev/null 2>&1 || true
            if [ -n "$db_container" ]; then
              docker rm -f "$db_container" >/dev/null 2>&1 || true
            fi
            if [ -n "$network" ]; then
              docker network rm "$network" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          host_port=""
          ready=0
          for attempt in $(seq 1 40); do
            if ! docker ps --no-trunc --format '{{.ID}}' | grep -q -F "$container_id"; then
              echo "Container exited before becoming ready" >&2
              docker logs "$container_id" || true
              exit 1
            fi

            mapping="$(docker port "$container_id" ${{ matrix.port }} 2>/dev/null | head -n1 || true)"
            if [ -n "$mapping" ]; then
              host_port="${mapping##*:}"
            fi

            if [ -n "$host_port" ]; then
              if curl --fail --silent --show-error --max-time 5 "http://127.0.0.1:${host_port}${{ matrix.endpoint }}" >/dev/null; then
                ready=1
                break
              fi
            fi

            sleep 3
          done

          if [ "$ready" -ne 1 ]; then
            echo "Service did not respond on http://127.0.0.1:${host_port:-unknown}${{ matrix.endpoint }}" >&2
            docker logs "$container_id" || true
            exit 1
          fi

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            printf -- "- %s image responded at %s\n" "${{ matrix.title }}" "${{ matrix.endpoint }}" >>"$GITHUB_STEP_SUMMARY"
          fi

      - name: Remove ${{ matrix.title }} image
        shell: bash
        run: |
          set -euo pipefail
          image="${BUILT_IMAGE:?missing image tag}"
          docker image rm "$image" >/dev/null 2>&1 || true
