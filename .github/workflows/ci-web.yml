name: ci-web

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    env:
      PORTAL_SESSION_SECRET: ci-portal-session-secret
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect web project root
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          project=""

          if [ -f web/package.json ]; then
            project="web"
          elif [ -f package.json ]; then
            project="."
          fi

          echo "project=${project}" >>"$GITHUB_OUTPUT"

          lockfile=""
          if [ "${project}" = "web" ]; then
            lockfile="web/package-lock.json"
          elif [ "${project}" = "." ]; then
            lockfile="package-lock.json"
          fi

          echo "lockfile=${lockfile}" >>"$GITHUB_OUTPUT"

      - name: No frontend project detected
        if: steps.detect.outputs.project == ''
        run: echo "No Next.js/React project detected; skipping web CI." >>"$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js
        if: steps.detect.outputs.project != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ steps.detect.outputs.lockfile }}

      - name: Ensure npm 11.6
        if: steps.detect.outputs.project != ''
        run: npm install -g npm@11.6.0

      - name: Install dependencies
        if: steps.detect.outputs.project != ''
        shell: bash
        working-directory: ${{ steps.detect.outputs.project }}
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: npm run lint
        if: steps.detect.outputs.project != ''
        shell: bash
        working-directory: ${{ steps.detect.outputs.project }}
        run: |
          set -euo pipefail
          if node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts.lint ? 0 : 1);"; then
            npm run lint
          else
            echo "No lint script declared; skipping lint." >>"$GITHUB_STEP_SUMMARY"
          fi

      - name: npm run test -- --runInBand
        if: steps.detect.outputs.project != ''
        shell: bash
        working-directory: ${{ steps.detect.outputs.project }}
        run: |
          set -euo pipefail
          if node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts.test ? 0 : 1);"; then
            npm run test -- --runInBand
          else
            echo "No test script declared; skipping web tests." >>"$GITHUB_STEP_SUMMARY"
          fi

      - name: npm run build
        if: steps.detect.outputs.project != ''
        shell: bash
        working-directory: ${{ steps.detect.outputs.project }}
        run: |
          set -euo pipefail
          if node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts.build ? 0 : 1);"; then
            npm run build
          else
            echo "No build script declared; skipping web build." >>"$GITHUB_STEP_SUMMARY"
          fi

      - name: Install Google Chrome
        if: steps.detect.outputs.project != ''
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/google.gpg
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list >/dev/null
          sudo apt-get update
          sudo apt-get install --yes google-chrome-stable

      - name: npm run lighthouse:ci
        if: steps.detect.outputs.project != ''
        shell: bash
        working-directory: ${{ steps.detect.outputs.project }}
        env:
          CHROME_PATH: /usr/bin/google-chrome
          LHCI_CHROME_PATH: /usr/bin/google-chrome
          LHCI_CHROME_FLAGS: --no-sandbox --disable-dev-shm-usage --headless=new
        run: |
          set -euo pipefail
          if node -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts['lighthouse:ci'] ? 0 : 1);"; then
            npm run lighthouse:ci
          else
            echo "No Lighthouse CI script declared; skipping audit." >>"$GITHUB_STEP_SUMMARY"
          fi
