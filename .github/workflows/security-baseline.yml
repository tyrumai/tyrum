name: security-baseline

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  baseline:
    name: Security baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (workspace packages)
        run: pnpm audit

      - name: Report failure for triage
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const {owner, repo} = context.repo;
            const label = 'ops: security-baseline';
            const issueTitle = 'Security baseline failure';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              'The scheduled `security-baseline` workflow failed.',
              '',
              `- Run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- SHA: ${context.sha}`,
              '',
              'Please triage and close this issue once the failure has been addressed.'
            ].join('\n');

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            const existing = openIssues.data.find((issue) => issue.title === issueTitle);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body,
                labels: ['type: chore', 'priority: now', 'area: infra', label],
              });
            }
