name: security-baseline

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "patches/**"
      - "packages/**/package.json"
      - "apps/**/package.json"
      - ".github/workflows/security-baseline.yml"
  pull_request:
    branches:
      - main

jobs:
  baseline:
    name: Security baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect dependency changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deps:
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "patches/**"
              - "packages/**/package.json"
              - "apps/**/package.json"
              - ".github/workflows/security-baseline.yml"

      - name: Skip baseline (no dependency changes)
        if: github.event_name == 'pull_request' && steps.filter.outputs.deps != 'true'
        run: echo "No dependency manifest changes detected; skipping pnpm audit."

      - uses: pnpm/action-setup@v4
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' || steps.filter.outputs.deps == 'true'
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' || steps.filter.outputs.deps == 'true'
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' || steps.filter.outputs.deps == 'true'
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (workspace packages)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' || steps.filter.outputs.deps == 'true'
        # CVE-2026-0540 (DOMPurify) has no released patched version yet.
        # We apply the upstream fix via pnpm patchedDependencies and ignore it via pnpm auditConfig.
        run: pnpm audit

      - name: Report failure for triage
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const {owner, repo} = context.repo;
            const label = 'ops: security-baseline';
            const issueTitle = 'Security baseline failure';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              'The scheduled `security-baseline` workflow failed.',
              '',
              `- Run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- SHA: ${context.sha}`,
              '',
              'Please triage and close this issue once the failure has been addressed.'
            ].join('\n');

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            const existing = openIssues.data.find((issue) => issue.title === issueTitle);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body,
                labels: ['type: chore', 'priority: now', 'area: infra', label],
              });
            }
