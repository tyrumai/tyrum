name: security-baseline

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "patches/**"
      - "packages/**/package.json"
      - "apps/**/package.json"
      - ".github/workflows/security-baseline.yml"
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "patches/**"
      - "packages/**/package.json"
      - "apps/**/package.json"
      - ".github/workflows/security-baseline.yml"

jobs:
  baseline:
    name: Security baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (workspace packages)
        # CVE-2026-31808 (file-type) is fixed upstream, but @nut-tree-fork/nut-js still pulls file-type 16.5.4 via Jimp.
        # We apply the loop-guard patch locally and keep the audit ignore until that transitive chain upgrades.
        run: pnpm audit

      - name: Report failure for triage
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ github.token }}
          script: |
            const {owner, repo} = context.repo;
            const label = 'ops: security-baseline';
            const issueTitle = 'Security baseline failure';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              'The scheduled `security-baseline` workflow failed.',
              '',
              `- Run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- SHA: ${context.sha}`,
              '',
              'Please triage and close this issue once the failure has been addressed.'
            ].join('\n');

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            const existing = openIssues.data.find((issue) => issue.title === issueTitle);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body,
                labels: ['type: chore', 'priority: now', 'area: infra', label],
              });
            }
