name: desktop-sandbox-image

on:
  pull_request:
    branches: [main]
    paths:
      - "docker/desktop-sandbox/**"
      - "packages/contracts/**"
      - "packages/cli-utils/**"
      - "packages/desktop-node/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - "scripts/**"
      - "patches/**"
      - ".github/workflows/desktop-sandbox-image.yml"
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/tyrumai/tyrum-desktop-sandbox

jobs:
  build:
    name: Build Desktop Sandbox Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - id: vars
        name: Resolve publish tags
        shell: bash
        run: |
          set -euo pipefail

          push_image=false
          short_sha="${GITHUB_SHA::7}"
          tags=""

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            pr_number="${{ github.event.pull_request.number }}"
            tags="type=raw,value=pr-${pr_number}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            push_image=true
            tags=$'type=raw,value=main\n'
            tags+="type=raw,value=sha-${short_sha}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            push_image=true
            tag_name="${GITHUB_REF_NAME}"
            version="${tag_name#v}"
            tags="type=raw,value=${version}"

            if [[ "${tag_name}" == *"-beta."* ]]; then
              tags+=$'\n''type=raw,value=beta'
            elif [[ "${tag_name}" == *"-dev."* ]]; then
              tags+=$'\n''type=raw,value=dev'
            else
              tags+=$'\n''type=raw,value=stable'
              tags+=$'\n''type=raw,value=latest'
            fi
          else
            echo "Unsupported ref ${GITHUB_REF}"
            exit 1
          fi

          echo "push_image=${push_image}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.vars.outputs.push_image == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: docker/desktop-sandbox/Dockerfile
          platforms: linux/amd64
          push: ${{ steps.vars.outputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
