name: desktop-sandbox-image

on:
  pull_request:
    branches: [main]
    paths:
      - "docker/desktop-sandbox/**"
      - "packages/contracts/**"
      - "packages/cli-utils/**"
      - "packages/desktop-node/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - "scripts/**"
      - "patches/**"
      - ".github/workflows/desktop-sandbox-image.yml"
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/tyrumai/tyrum-desktop-sandbox

jobs:
  build:
    name: Build Desktop Sandbox Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - id: vars
        name: Resolve publish tags
        shell: bash
        run: |
          set -euo pipefail

          push_image=false
          short_sha="${GITHUB_SHA::7}"
          target=""
          tags=""

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            target="builder"
            pr_number="${{ github.event.pull_request.number }}"
            tags="type=raw,value=pr-${pr_number}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            push_image=true
            tags=$'type=raw,value=main\n'
            tags+="type=raw,value=sha-${short_sha}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            push_image=true
            tag_name="${GITHUB_REF_NAME}"
            version="${tag_name#v}"
            tags="type=raw,value=${version}"

            if [[ "${tag_name}" == *"-beta."* ]]; then
              tags+=$'\n''type=raw,value=beta'
            elif [[ "${tag_name}" == *"-dev."* ]]; then
              tags+=$'\n''type=raw,value=dev'
            else
              tags+=$'\n''type=raw,value=stable'
              tags+=$'\n''type=raw,value=latest'
            fi
          else
            echo "Unsupported ref ${GITHUB_REF}"
            exit 1
          fi

          {
            echo "push_image=${push_image}"
            echo "target=${target}"
            echo "tags<<EOF"
            printf '%s\n' "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.vars.outputs.push_image == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/desktop-sandbox/Dockerfile
          platforms: linux/amd64
          target: ${{ steps.vars.outputs.target }}
          push: ${{ steps.vars.outputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify published tags are anonymously pullable
        if: steps.vars.outputs.push_image == 'true'
        shell: bash
        run: |
          set -euo pipefail

          anon_config="${RUNNER_TEMP}/docker-anon"
          mkdir -p "${anon_config}"

          while IFS= read -r image_ref; do
            [[ -n "${image_ref}" ]] || continue
            echo "Checking anonymous pullability for ${image_ref}"
            for attempt in 1 2 3 4 5; do
              if DOCKER_CONFIG="${anon_config}" docker manifest inspect "${image_ref}" >/dev/null; then
                break
              fi
              if [[ "${attempt}" == "5" ]]; then
                echo "Anonymous pull check failed for ${image_ref}" >&2
                exit 1
              fi
              sleep 5
            done
          done <<'EOF'
          ${{ steps.meta.outputs.tags }}
          EOF
