# Reference values for `charts/tyrum` single-host mode.
mode: single

runtime:
  home: /var/lib/tyrum
  db: /var/lib/tyrum/gateway.db
  host: 0.0.0.0
  tlsReady: true
  # Optional: trusted reverse proxy allowlist (comma-separated IPs/CIDRs).
  trustedProxies: ""
  enableEngineApi: true

env:
  TYRUM_SECRET_PROVIDER: env

persistence:
  enabled: true
