packages:
  - "packages/*"
  - "apps/*"

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - vite@8.0.5
blockExoticSubdeps: true
strictDepBuilds: true

onlyBuiltDependencies:
  - better-sqlite3
  - core-js
  - core-js-pure
  - electron
  - electron-winstaller
  - esbuild
  - protobufjs
  - tesseract.js
  - usocket
