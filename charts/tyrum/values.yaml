mode: single

image:
  repository: tyrum/gateway
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8788

gatewayToken:
  # If set, use this secret (key: token). Otherwise create one from value.
  existingSecret: ""
  value: ""

runtime:
  home: /var/lib/tyrum
  db: /var/lib/tyrum/gateway.db
  host: 0.0.0.0
  # Remote deployments should be fronted by TLS termination (Ingress/reverse proxy).
  tlsReady: true
  tlsSelfSigned: false
  # Optional: trusted reverse proxy allowlist (comma-separated IPs/CIDRs).
  # When unset, the gateway ignores Forwarded/X-Forwarded-For/X-Real-IP headers
  # and derives the client IP from the socket.
  trustedProxies: ""
  allowInsecureHttp: false
  # Enable durable workflow APIs and engine-backed WS control plane.
  enableEngineApi: true

env:
  # Enterprise default per ADR-0007. Values: env|file|keychain
  TYRUM_SECRET_PROVIDER: env
  # Artifacts: default fs; set to s3 with the S3 env vars below.
  TYRUM_ARTIFACT_STORE: fs
  TYRUM_ARTIFACTS_DIR: /var/lib/tyrum/artifacts
  TYRUM_ARTIFACTS_S3_ENDPOINT: ""
  TYRUM_ARTIFACTS_S3_BUCKET: tyrum-artifacts
  TYRUM_ARTIFACTS_S3_REGION: us-east-1
  TYRUM_ARTIFACTS_S3_FORCE_PATH_STYLE: "1"
  TYRUM_ARTIFACTS_S3_ACCESS_KEY_ID: ""
  TYRUM_ARTIFACTS_S3_SECRET_ACCESS_KEY: ""

otel:
  enabled: false
  otlpEndpoint: ""

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  startup:
    failureThreshold: 30
    periodSeconds: 1
    timeoutSeconds: 1

persistence:
  enabled: true
  existingClaim: ""
  storageClassName: ""
  accessModes: ["ReadWriteOnce"]
  size: 1Gi

resources: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true

split:
  edge:
    replicaCount: 1
  worker:
    replicaCount: 1
  scheduler:
    replicaCount: 1
