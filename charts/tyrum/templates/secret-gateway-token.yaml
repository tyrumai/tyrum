{{- if not .Values.gatewayToken.existingSecret }}
{{- $secretName := printf "%s-gateway-token" (include "tyrum.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingToken := "" -}}
{{- if $existing }}
{{- $existingToken = (index $existing.data "token" | default "" | b64dec) -}}
{{- end }}
{{- $token := default (default (randAlphaNum 64) $existingToken) .Values.gatewayToken.value -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "tyrum.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ $token | quote }}
{{- end }}
