{{- if ne .Values.mode "single" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tyrum.fullname" . }}
  labels:
    {{- include "tyrum.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tyrum.fullname" . }}-toolrunner
  labels:
    {{- include "tyrum.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tyrum.fullname" . }}-toolrunner
  labels:
    {{- include "tyrum.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tyrum.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tyrum.fullname" . }}-toolrunner
{{- end }}

