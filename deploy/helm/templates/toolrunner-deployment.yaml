apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-toolrunner
  labels:
    app.kubernetes.io/name: toolrunner
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.toolrunner.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: toolrunner
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: toolrunner
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: toolrunner
          image: "{{ .Values.toolrunner.image.repository }}:{{ .Values.toolrunner.image.tag }}"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: {{ .Values.toolrunner.resources.limits.cpu | default "500m" | quote }}
              memory: {{ .Values.toolrunner.resources.limits.memory | default "512Mi" | quote }}
            requests:
              cpu: {{ .Values.toolrunner.resources.requests.cpu | default "100m" | quote }}
              memory: {{ .Values.toolrunner.resources.requests.memory | default "128Mi" | quote }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ .Values.toolrunner.workspacePvcClaim | default (printf "%s-workspace" .Release.Name) }}
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
