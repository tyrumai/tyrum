# Source: tyrum-core/templates/file-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: tyrum-tyrum-core-loki-files
  labels:
    helm.sh/chart: tyrum-core-0.1.0
    app.kubernetes.io/name: tyrum-core
    app.kubernetes.io/instance: tyrum
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: loki
    tyrum.dev/service: loki
  annotations:
    tyrum.dev/config-purpose: file-mounts
    tyrum.dev/managed-for: loki
data:
  config.yaml: |-

    server:
      http_listen_port: 3100
      log_level: info
    
    auth_enabled: false
    
    table_manager:
      retention_deletes_enabled: true
      retention_period: 168h
    
    schema_config:
      configs:
        - from: 2020-10-15
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    
    storage_config:
      boltdb_shipper:
        active_index_directory: /var/loki/index
        shared_store: filesystem
        cache_location: /var/loki/cache
      filesystem:
        directory: /var/loki/chunks
    
    limits_config:
      allow_structured_metadata: true
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      retention_period: 168h
    
    chunk_store_config:
      max_look_back_period: 0s
    
    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        final_sleep: 0s
      chunk_idle_period: 5m
      chunk_retain_period: 1m
---
