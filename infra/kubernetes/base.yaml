    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: tempo
    tyrum.dev/service: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tyrum-tyrum-core-tempo
      app.kubernetes.io/instance: tyrum
      app.kubernetes.io/component: tempo
      tyrum.dev/service: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tyrum-tyrum-core-tempo
        app.kubernetes.io/instance: tyrum
        app.kubernetes.io/component: tempo
        tyrum.dev/service: tempo
    spec:
      serviceAccountName: tyrum-tyrum-core
      
      containers:
        - name: tempo
          image: grafana/tempo:2.6.1
          imagePullPolicy: IfNotPresent
          command:
            - -config.file=/etc/tempo.yaml
          ports:
            
            - containerPort: 3200
              name: http
            - containerPort: 4317
              name: grpc
            - containerPort: 9095
              name: frontend
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          
          volumeMounts:
            - mountPath: /etc
              name: tempo-config
              readOnly: true
            - mountPath: /var/tempo
              name: tempo-data
      volumes:
        - configMap:
            name: 'tyrum-tyrum-core-tempo-files'
          name: tempo-config
        - emptyDir: {}
          name: tempo-data
---
