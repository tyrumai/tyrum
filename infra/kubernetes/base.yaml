apiVersion: v1
kind: ConfigMap
metadata:
  name: tyrum-tyrum-core-otel-collector-files
  labels:
    helm.sh/chart: tyrum-core-0.1.0
    app.kubernetes.io/name: tyrum-core
    app.kubernetes.io/instance: tyrum
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: otel-collector
    tyrum.dev/service: otel-collector
  annotations:
    tyrum.dev/config-purpose: file-mounts
    tyrum.dev/managed-for: otel-collector
data:
  config.yaml: |-

    extensions:
      health_check: {}
    
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
    
    processors:
      batch:
        timeout: 5s
    
    exporters:
      prometheus:
        endpoint: 0.0.0.0:9464
        resource_to_telemetry_conversion:
          enabled: true
      otlp/tempo:
        endpoint: tyrum-tyrum-core-tempo.default.svc.cluster.local:4317
        tls:
          insecure: true
      loki:
        endpoint: http://tyrum-tyrum-core-loki.default.svc.cluster.local:3100/loki/api/v1/push
        tls:
          insecure: true
        labels:
          resource:
            service.name: service_name
          attributes:
            severity_text: level
    
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [loki]
