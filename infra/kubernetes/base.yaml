apiVersion: batch/v1
kind: Job
metadata:
  name: tyrum-tyrum-core-api-migrations
  labels:
    helm.sh/chart: tyrum-core-0.1.0
    app.kubernetes.io/name: tyrum-core
    app.kubernetes.io/instance: tyrum
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api-migrations
    tyrum.dev/job: api-migrations
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tyrum-tyrum-core-api-migrations
        app.kubernetes.io/instance: tyrum
        app.kubernetes.io/component: api-migrations
        tyrum.dev/service: api-migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: tyrum-tyrum-core
      
      containers:
        - name: api-migrations
          image: tyrum/api:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: tyrum-tyrum-core-api-migrations-config
            - secretRef:
                name: tyrum-tyrum-core-api-migrations-secrets
