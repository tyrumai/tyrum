data:
  datasources.yaml: |-

    apiVersion: 1
    
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://tyrum-tyrum-core-prometheus.default.svc.cluster.local:9090
        isDefault: true
        jsonData:
          httpMethod: GET
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://tyrum-tyrum-core-loki.default.svc.cluster.local:3100
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tyrum-tyrum-core-tempo.default.svc.cluster.local:3200
        jsonData:
          httpMethod: GET
          tracesToLogs:
            datasourceUid: loki
            mappedTags:
              - key: service.name
                value: service_name
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            filterByTraceID: true
            filterBySpanID: false
