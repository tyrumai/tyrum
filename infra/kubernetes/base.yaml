# Source: tyrum-core/templates/file-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: tyrum-tyrum-core-tempo-files
  labels:
    helm.sh/chart: tyrum-core-0.1.0
    app.kubernetes.io/name: tyrum-core
    app.kubernetes.io/instance: tyrum
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: tempo
    tyrum.dev/service: tempo
  annotations:
    tyrum.dev/config-purpose: file-mounts
    tyrum.dev/managed-for: tempo
data:
  tempo.yaml: |-

    server:
      http_listen_port: 3200
      grpc_listen_port: 4317
      log_level: info
    
    distributor:
      receivers:
        otlp:
          protocols:
            http: {}
            grpc: {}
    
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        final_sleep: 0s
      max_block_duration: 5m
      trace_idle_period: 30s
    
    querier:
      frontend_worker:
        frontend_address: tyrum-tyrum-core-tempo.default.svc.cluster.local:9095
    
    query_frontend:
      search:
        concurrent_jobs: 200
        target_bytes_per_job: 10000000
    
    compactor:
      compaction:
        block_retention: 48h
      ring:
        kvstore:
          store: inmemory
      working_directory: /var/tempo/compactor
    
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
