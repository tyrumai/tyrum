        \    tracesToLogs:\n        datasourceUid: loki\n        mappedTags:\n   \
        \       - key: service.name\n            value: service_name\n        spanStartTimeShift:\
        \ \"-5m\"\n        spanEndTimeShift: \"5m\"\n        filterByTraceID: true\n\
        \        filterBySpanID: false\n"
