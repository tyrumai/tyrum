        ) }}:9090\n    isDefault: true\n    jsonData:\n      httpMethod: GET\n  -\
        \ name: Loki\n    uid: loki\n    type: loki\n    access: proxy\n    url: http://{{\
        \ include \"tyrum-core.serviceHostname\" (dict \"root\" . \"name\" \"loki\"\
