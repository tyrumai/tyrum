nameOverride: ''
fullnameOverride: ''
global:
  image:
    tag: local
  telegram:
    botToken: local-telegram-token
    webhookUrl: https://example.com/api/telegram/webhook
    webhookSecret: local-telegram-secret
  otel:
    endpoint: ''
    protocol: grpc
  llm:
    backendUrl: ''
    modelName: tyrum-stub-8b
    rateLimitPerSecond: 10
  postgres:
    user: tyrum
    password: tyrum_dev_password
    database: tyrum_dev
imagePullSecrets: []
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''
podAnnotations: {}
podLabels: {}
helmTest:
  image: curlimages/curl:8.11.1
  timeoutSeconds: 10
services:
  policy:
    replicaCount: 1
    image:
      repository: tyrum/policy
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8081
      portName: http
    podAnnotations: {}
    podLabels: {}
    config:
      RUST_LOG: info
      POLICY_BIND_ADDR: 0.0.0.0:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: '{{ .Values.global.otel.endpoint }}'
      OTEL_EXPORTER_OTLP_PROTOCOL: '{{ .Values.global.otel.protocol }}'
    secrets: {}
    ports:
    - name: http
      containerPort: 8081
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 55
      targetMemoryUtilizationPercentage: 70
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      path: /healthz
      port: 8081
  wallet:
    replicaCount: 1
    image:
      repository: tyrum/wallet
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8084
      portName: http
    config:
      RUST_LOG: info
      WALLET_BIND_ADDR: 0.0.0.0:8084
      WALLET_AUTO_APPROVE_LIMIT_MINOR: '10000'
      WALLET_HARD_DENY_LIMIT_MINOR: '50000'
      OTEL_EXPORTER_OTLP_ENDPOINT: '{{ .Values.global.otel.endpoint }}'
      OTEL_EXPORTER_OTLP_PROTOCOL: '{{ .Values.global.otel.protocol }}'
    secrets: {}
    ports:
    - name: http
      containerPort: 8084
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 60
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      path: /healthz
      port: 8084
  planner:
    replicaCount: 1
    image:
      repository: tyrum/planner
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8083
      portName: http
    config:
      RUST_LOG: info
      PLANNER_BIND_ADDR: 0.0.0.0:8083
      POLICY_GATE_URL: http://{{ include "tyrum-core.serviceHostname" (dict "root"
        . "name" "policy") }}:8081
      WALLET_GATE_URL: http://{{ include "tyrum-core.serviceHostname" (dict "root"
        . "name" "wallet") }}:8084
      LLM_GATEWAY_URL: http://{{ include "tyrum-core.serviceHostname" (dict "root"
        . "name" "llm-gateway") }}:8086/completions
      PLANNER_EVENT_LOG_URL: postgres://{{ .Values.global.postgres.user }}:{{ .Values.global.postgres.password
        }}@{{ include "tyrum-core.serviceHostname" (dict "root" . "name" "postgres")
        }}:5432/{{ .Values.global.postgres.database }}
      OTEL_EXPORTER_OTLP_ENDPOINT: '{{ .Values.global.otel.endpoint }}'
      OTEL_EXPORTER_OTLP_PROTOCOL: '{{ .Values.global.otel.protocol }}'
    secrets: {}
    ports:
    - name: http
      containerPort: 8083
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 55
      targetMemoryUtilizationPercentage: 70
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      path: /healthz
      port: 8083
  watchers-processor:
    replicaCount: 1
    image:
      repository: tyrum/watchers
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: false
    config:
      RUST_LOG: info,tyrum_watchers=info
      WATCHERS_JETSTREAM_URL: nats://{{ include "tyrum-core.serviceHostname" (dict
        "root" . "name" "nats") }}:4222
      WATCHERS_JETSTREAM_STREAM: watchers_events
      WATCHERS_JETSTREAM_SUBJECT_PREFIX: watchers.events
      WATCHERS_JETSTREAM_PROCESSOR_CONSUMER: watchers_local_processor
      WATCHERS_PLANNER_URL: http://{{ include "tyrum-core.serviceHostname" (dict "root"
        . "name" "planner") }}:8083/plan
      WATCHERS_PROCESSOR_FETCH_TIMEOUT_MS: '500'
    secrets: {}
    ports: []
    probes: {}
    hpa:
      enabled: false
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test: {}
  executor-web:
    replicaCount: 1
    image:
      repository: tyrum/executor-web
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8091
      portName: http
    config:
      RUST_LOG: info
      WEB_EXECUTOR_BIND_ADDR: 0.0.0.0:8091
    secrets: {}
    ports:
    - name: http
      containerPort: 8091
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 60
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      path: /healthz
      port: 8091
  executor-http:
    replicaCount: 1
    image:
      repository: tyrum/executor-http
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8092
      portName: http
    config:
      RUST_LOG: info
      HTTP_EXECUTOR_BIND_ADDR: 0.0.0.0:8092
    secrets: {}
    ports:
    - name: http
      containerPort: 8092
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 60
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      path: /healthz
      port: 8092
  executor-cli:
    replicaCount: 1
    image:
      repository: tyrum/executor-cli
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8093
      portName: http
    config:
      RUST_LOG: info
      CLI_EXECUTOR_BIND_ADDR: 0.0.0.0:8093
      CLI_EXECUTOR_SANDBOX_DIR: /sandbox
    secrets: {}
    ports:
    - name: http
      containerPort: 8093
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: false
    resources: {}
    env: []
    envFrom: []
    volumeMounts:
    - name: sandbox
      mountPath: /sandbox
    volumes:
    - name: sandbox
      emptyDir:
        medium: Memory
    test:
      path: /healthz
      port: 8093
  executor-android:
    enabled: false
    replicaCount: 1
    image:
      repository: tyrum/executor-android
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: false
    config:
      RUST_LOG: info
      AVD_NAME: tyrum-android-executor
      ANDROID_BOOT_TIMEOUT_SECONDS: '480'
      EMULATOR_CONSOLE_PORT_INTERNAL: '5654'
      EMULATOR_ADB_PORT_INTERNAL: '5655'
    secrets: {}
    ports: []
    probes: {}
    hpa:
      enabled: false
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test: {}
  nats:
    replicaCount: 1
    image:
      repository: nats
      tag: 2.12
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      ports:
      - name: client
        port: 4222
        targetPort: 4222
      - name: http
        port: 8222
        targetPort: 8222
    config: {}
    secrets: {}
    command:
    - -js
    - -m
    - '8222'
    ports:
    - name: client
      containerPort: 4222
    - name: http
      containerPort: 8222
    probes:
      liveness:
        httpGet:
          path: /healthz?js-enabled
          port: http
        initialDelaySeconds: 10
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz?js-enabled
          port: http
        initialDelaySeconds: 10
        periodSeconds: 10
    hpa:
      enabled: false
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      image: nats:2.10-alpine
      command:
      - /bin/sh
      - -c
      - wget --spider -q http://{{ include "tyrum-core.serviceHostname" (dict "root"
        . "name" "nats") }}:8222/healthz?js-enabled
      port: 4222
  llm-gateway:
    replicaCount: 1
    image:
      repository: tyrum/llm-gateway
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8086
      portName: http
    config:
      LLM_GATEWAY_BIND_ADDR: 0.0.0.0:8086
      LLM_VLLM_URL: '{{ .Values.global.llm.backendUrl }}'
      LLM_GATEWAY_MODEL: '{{ .Values.global.llm.modelName }}'
      LLM_RATE_LIMIT_PER_SECOND: '{{ .Values.global.llm.rateLimitPerSecond }}'
    secrets: {}
    ports:
    - name: http
      containerPort: 8086
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 60
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      path: /healthz
      port: 8086
  model-gateway:
    replicaCount: 1
    image:
      repository: tyrum/model-gateway
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8001
      portName: http
    config:
      MODEL_GATEWAY_BIND_ADDR: 0.0.0.0:8001
      MODEL_GATEWAY_CONFIG: /app/config/model_gateway.yml
    files:
      model_gateway.yml: "defaults:\n  timeout_ms: 20000\n\nauth_profiles:\n  local_vllm:\n\
        \    type: none\n  mock:\n    type: none\n\nmodels:\n  {{ .Values.global.llm.modelName\
        \ }}:\n    target: local_vllm\n    endpoint: http://{{ include \"tyrum-core.serviceHostname\"\
        \ (dict \"root\" . \"name\" \"vllm-gateway\") }}:8000\n    capabilities: [text]\n\
        \n  frontier-mock:\n    target: mock\n    endpoint: http://{{ include \"tyrum-core.serviceHostname\"\
        \ (dict \"root\" . \"name\" \"mock-llm\") }}:8085\n    capabilities: [text]\n"
    secrets: {}
    ports:
    - name: http
      containerPort: 8001
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 60
    resources: {}
    env: []
    envFrom: []
    volumeMounts:
    - name: model-gateway-config
      mountPath: /app/config
      readOnly: true
    volumes:
    - name: model-gateway-config
      configMap:
        name: '{{ include "tyrum-core.serviceFilesName" (dict "root" .root "name"
          "model-gateway") }}'
    test:
      path: /healthz
      port: 8001
  vllm-gateway:
    enabled: false
    replicaCount: 1
    image:
      repository: tyrum/vllm-gateway
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8000
      portName: http
    config:
      VLLM_MODEL: hf-internal-testing/tiny-random-LlamaForCausalLM
      VLLM_MODEL_NAME: '{{ .Values.global.llm.modelName }}'
      VLLM_EXTRA_ARGS: ''
    secrets: {}
    ports:
    - name: http
      containerPort: 8000
    probes:
      liveness:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 20
        periodSeconds: 10
      readiness:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 20
        periodSeconds: 10
    hpa:
      enabled: false
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      port: 8000
  api:
    replicaCount: 1
    image:
      repository: tyrum/api
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8080
      portName: http
    config:
      RUST_LOG: info
      API_BIND_ADDR: 0.0.0.0:8080
      REDIS_URL: redis://{{ include "tyrum-core.serviceHostname" (dict "root" . "name"
        "redis") }}:6379/0
      MOCK_LLM_URL: http://{{ include "tyrum-core.serviceHostname" (dict "root" .
        "name" "mock-llm") }}:8085
      OTEL_EXPORTER_OTLP_ENDPOINT: '{{ .Values.global.otel.endpoint }}'
      OTEL_EXPORTER_OTLP_PROTOCOL: '{{ .Values.global.otel.protocol }}'
      TELEGRAM_WEBHOOK_URL: '{{ .Values.global.telegram.webhookUrl }}'
    secrets:
      DATABASE_URL: postgres://{{ .Values.global.postgres.user }}:{{ .Values.global.postgres.password
        }}@{{ include "tyrum-core.serviceHostname" (dict "root" . "name" "postgres")
        }}:5432/{{ .Values.global.postgres.database }}
      TELEGRAM_WEBHOOK_SECRET: '{{ .Values.global.telegram.webhookSecret }}'
      TELEGRAM_BOT_TOKEN: '{{ .Values.global.telegram.botToken }}'
    ports:
    - name: http
      containerPort: 8080
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 10
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 10
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 60
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      path: /healthz
      port: 8080
  web:
    replicaCount: 1
    image:
      repository: tyrum/web
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 3000
      portName: http
    config:
      NEXT_TELEMETRY_DISABLED: '1'
      API_BASE_URL: http://{{ include "tyrum-core.serviceHostname" (dict "root" .
        "name" "api") }}:8080
    secrets: {}
    ports:
    - name: http
      containerPort: 3000
    probes:
      liveness:
        httpGet:
          path: /
          port: http
        initialDelaySeconds: 15
        periodSeconds: 10
      readiness:
        httpGet:
          path: /
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 60
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      path: /
      port: 3000
  mock-llm:
    replicaCount: 1
    image:
      repository: tyrum/mock-llm
      tag: '{{ .Values.global.image.tag }}'
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 8085
      portName: http
    config: {}
    secrets: {}
    ports:
    - name: http
      containerPort: 8085
    probes:
      liveness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: false
    resources: {}
    env: []
    envFrom: []
    volumeMounts: []
    volumes: []
    test:
      path: /healthz
      port: 8085
  postgres:
    replicaCount: 1
    strategy:
      type: Recreate
    image:
      repository: pgvector/pgvector
      tag: pg16
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 5432
      portName: tcp
    config:
      POSTGRES_DB: '{{ .Values.global.postgres.database }}'
      POSTGRES_USER: '{{ .Values.global.postgres.user }}'
    secrets:
      POSTGRES_PASSWORD: '{{ .Values.global.postgres.password }}'
    ports:
    - name: tcp
      containerPort: 5432
    probes:
      liveness:
        exec:
          command:
          - /bin/sh
          - -c
          - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
        initialDelaySeconds: 20
        periodSeconds: 10
      readiness:
        exec:
          command:
          - /bin/sh
          - -c
          - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
        initialDelaySeconds: 10
        periodSeconds: 10
    hpa:
      enabled: false
    resources: {}
    env: []
    envFrom: []
    volumeMounts:
    - name: postgres-data
      mountPath: /var/lib/postgresql/data
    volumes:
    - name: postgres-data
      emptyDir: {}
    test:
      image: postgres:16-alpine
      command:
      - /bin/sh
      - -c
      - pg_isready -h {{ include "tyrum-core.serviceHostname" (dict "root" . "name"
        "postgres") }} -U {{ .Values.global.postgres.user }} -d {{ .Values.global.postgres.database
        }}
      port: 5432
  redis:
    replicaCount: 1
    cluster:
      enabled: true
      replicas: 3
      nodeTimeout: 5000
      persistence:
        size: 8Gi
        storageClass: ""
        volumeName: redis-data
        accessModes:
        - ReadWriteOnce
    standalone:
      command:
      - redis-server
      - --appendonly
      - 'no'
      volumeMounts: []
      volumes: []
      volumeClaimTemplates: []
    image:
      repository: redis
      tag: 8
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      port: 6379
      portName: tcp
    headlessService:
      annotations: {}
      publishNotReadyAddresses: true
    statefulSet:
      podManagementPolicy: Parallel
      updateStrategy:
        type: RollingUpdate
    config: {}
    secrets: {}
    command:
    - /bin/sh
    - -c
    - |
      redis-server \
        --cluster-enabled yes \
        --cluster-config-file /data/nodes.conf \
        --cluster-node-timeout {{ .root.Values.services.redis.cluster.nodeTimeout }} \
        --cluster-announce-host ${HOSTNAME}.{{ include "tyrum-core.serviceHeadlessFullname" (dict "root" .root "name" "redis") }} \
        --cluster-announce-port {{ .root.Values.services.redis.service.port }} \
        --cluster-announce-bus-port 16379 \
        --appendonly yes \
        --save 60 1000 \
        --protected-mode no
    ports:
    - name: redis
      containerPort: 6379
    - name: redis-bus
      containerPort: 16379
    probes:
      liveness:
        exec:
          command:
          - redis-cli
          - ping
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        exec:
          command:
          - redis-cli
          - ping
        initialDelaySeconds: 5
        periodSeconds: 10
    hpa:
      enabled: false
    resources: {}
    env: []
    envFrom: []
    volumeMounts:
    - name: redis-data
      mountPath: /data
    volumeClaimTemplates: []
    test:
      image: redis:7-alpine
      command:
      - /bin/sh
      - -c
      - |
        set -euo pipefail
        redis-cli -h {{ include "tyrum-core.serviceHostname" (dict "root" . "name" "redis") }} -c cluster info | grep -q 'cluster_state:ok'
      port: 6379
  otel-collector:
    replicaCount: 1
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: 0.138.0
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
      ports:
      - name: grpc
        port: 4317
        targetPort: 4317
      - name: http
        port: 4318
        targetPort: 4318
      - name: metrics
        port: 9464
        targetPort: 9464
    config: {}
    files:
      config.yaml: "extensions:\n  health_check: {}\n\nreceivers:\n  otlp:\n    protocols:\n\
        \      grpc: {}\n      http: {}\n\nprocessors:\n  batch:\n    timeout: 5s\n\
        \nexporters:\n  prometheus:\n    endpoint: 0.0.0.0:9464\n    resource_to_telemetry_conversion:\n\
        \      enabled: true\n  otlp/tempo:\n    endpoint: {{ include \"tyrum-core.serviceHostname\"\
        \ (dict \"root\" . \"name\" \"tempo\") }}:4317\n    tls:\n      insecure:\
        \ true\n  loki:\n    endpoint: http://{{ include \"tyrum-core.serviceHostname\"\
