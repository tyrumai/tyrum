services:
  policy:
    build:
      context: ..
      dockerfile: Dockerfile.policy
    image: tyrum/policy:local
    environment:
      RUST_LOG: info
      POLICY_BIND_ADDR: 0.0.0.0:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8081/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    image: tyrum/api:local
    environment:
      RUST_LOG: info
      API_BIND_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://tyrum:tyrum_dev_password@postgres:5432/tyrum_dev
      REDIS_URL: redis://redis:6379/0
      MOCK_LLM_URL: http://mock-llm:8085
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      policy:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mock-llm:
        condition: service_started
      otel-collector:
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: tyrum/web:local
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      API_BASE_URL: http://api:8080
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

  mock-llm:
    build:
      context: ../services/mock_llm
      dockerfile: Dockerfile
    image: tyrum/mock-llm:local
    ports:
      - "8085:8085"
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tyrum
      POSTGRES_PASSWORD: tyrum_dev_password
      POSTGRES_DB: tyrum_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:2.9.4
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/var/loki
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: tyrum
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started

volumes:
  postgres_data:
  tempo_data:
  loki_data:
  grafana_storage:
